<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCOL — Quantum Notebook</title>
<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- CodeMirror 5 (editor profesional) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<!-- Markdown + MathJax -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
<!-- Highlight.js para código en markdown -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/dist/highlight.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════
   QUANTUM NOTEBOOK — Estilo QCOL unificado
   ═══════════════════════════════════════════════════════════════ */
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#0d1220;
  --p:#111827;--p2:#1a2540;
  --bd:#1e3058;--bd2:#254070;
  --bl:#0088ff;--bl2:#00aaff;--cy:#00ffdd;
  --gr:#00ff88;--yw:#ffd700;--rd:#ff4466;--pu:#bd93f9;
  --tx:#e2ecff;--tx2:#aabcda;--mu:#4a6a9a;--mu2:#2a3a5a;
  --kw:#ff79c6;--fn:#50fa7b;--st:#f1fa8c;--nm:#bd93f9;--cmt:#636e8a;--cl:#8be9fd;--qt:#ff9580;
  --orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--ex:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ex);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* Notificaciones */
.notif{position:fixed;top:.7rem;right:.7rem;z-index:9999;padding:.5rem .9rem;
  background:rgba(10,14,26,.97);border:1px solid var(--cy);border-radius:8px;
  font-family:var(--orb);font-size:.58rem;color:var(--cy);
  transform:translateX(130%);transition:transform .3s;pointer-events:none;}
.notif.show{transform:translateX(0);}

/* Acceso denegado */
.access-denied{display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1.2rem;}
.access-denied.show{display:flex;}
.denied-icon{font-size:3rem;opacity:.4;}
.denied-title{font-family:var(--orb);font-size:1rem;color:var(--rd);}
.denied-desc{font-size:.75rem;color:var(--mu);max-width:340px;line-height:1.7;}

/* Barra superior */
.topbar{height:40px;display:flex;align-items:center;gap:.4rem;
  padding:0 .75rem;background:#07091200;background:linear-gradient(90deg,#07091299,#080d1899);
  backdrop-filter:blur(8px);border-bottom:1px solid rgba(189,147,249,.14);flex-shrink:0;z-index:10;}
.btn-nav-back{display:flex;align-items:center;gap:.25rem;padding:.2rem .55rem;
  background:rgba(189,147,249,.07);border:1px solid rgba(189,147,249,.25);border-radius:5px;
  color:var(--pu);font-family:var(--orb);font-size:.46rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.btn-nav-back:hover{background:rgba(189,147,249,.15);border-color:var(--pu);}
.btn-projects-back{display:none;align-items:center;gap:.25rem;padding:.2rem .55rem;
  background:rgba(0,136,255,.07);border:1px solid rgba(0,136,255,.25);border-radius:5px;
  color:var(--bl2);font-family:var(--orb);font-size:.46rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.btn-projects-back:hover{background:rgba(0,136,255,.15);border-color:var(--bl2);}
.tb-logo{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.tb-q{font-family:var(--orb);font-size:.7rem;font-weight:900;color:var(--cy);}
.tb-pro{font-family:var(--orb);font-size:.44rem;color:var(--pu);letter-spacing:.06em;
  background:rgba(189,147,249,.1);border:1px solid rgba(189,147,249,.2);
  padding:.08rem .3rem;border-radius:3px;}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.08);flex-shrink:0;}
.nb-name-inp{background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:.68rem;color:var(--tx);
  min-width:60px;max-width:200px;padding:.1rem .3rem;border-radius:4px;}
.nb-name-inp:focus{background:rgba(255,255,255,.04);color:var(--cy);}
.nb-name-inp::placeholder{color:var(--mu);}
#expo-badge{display:none;padding:.14rem .4rem;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);border-radius:4px;
  font-family:var(--orb);font-size:.43rem;color:var(--gr);flex-shrink:0;letter-spacing:.05em;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.28rem;}
.engine-url-input{background:rgba(0,0,0,.4);border:1px solid var(--bd2);border-radius:5px;
  padding:.17rem .42rem;font-family:var(--mono);font-size:.52rem;color:var(--tx2);width:155px;outline:none;}
.engine-url-input:focus{border-color:var(--bl2);}
.eng-pill{padding:.17rem .44rem;border-radius:10px;font-family:var(--orb);font-size:.42rem;
  background:rgba(74,106,154,.1);border:1px solid rgba(74,106,154,.2);color:var(--mu);}
.eng-pill.on{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.3);color:var(--gr);animation:puls 2.5s infinite;}
@keyframes puls{0%,100%{opacity:1;}50%{opacity:.6;}}
.user-pill{padding:.17rem .42rem;border-radius:10px;font-family:var(--orb);font-size:.44rem;
  background:rgba(189,147,249,.07);border:1px solid rgba(189,147,249,.18);color:var(--pu);}
.admin-pill{padding:.17rem .42rem;border-radius:10px;font-family:var(--orb);font-size:.42rem;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.18);color:var(--yw);}

/* Barra de secciones */
.secbar{height:30px;display:flex;align-items:stretch;
  background:#080b14;border-bottom:1px solid var(--bd3);flex-shrink:0;padding:0 .45rem;gap:.08rem;}
.stab{display:flex;align-items:center;gap:.22rem;padding:0 .6rem;
  background:transparent;border:none;color:var(--mu);
  font-family:var(--orb);font-size:.44rem;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;}
.stab.on{color:var(--pu);border-bottom-color:var(--pu);}
.stab:hover:not(.on){color:var(--tx2);}
.secbar-right{margin-left:auto;display:flex;align-items:center;gap:.22rem;padding:0 .15rem;}
.tbtn{display:flex;align-items:center;gap:.25rem;padding:.2rem .5rem;
  background:transparent;border:1px solid var(--bd2);border-radius:4px;
  color:var(--mu);font-family:var(--orb);font-size:.44rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--bl2);color:var(--bl2);background:rgba(0,136,255,.05);}
.tbtn.run{background:linear-gradient(135deg,#003388,var(--bl));border-color:var(--bl);color:#fff;}
.tbtn.run:hover{box-shadow:0 2px 8px rgba(0,136,255,.4);}
.tbtn.run-all{background:linear-gradient(135deg,#004400,#008833);border-color:#008833;color:#fff;}
.tbtn.pub{background:linear-gradient(135deg,#3a0075,var(--pu));border-color:var(--pu);color:#fff;}
.tbtn.rst{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.25);color:var(--yw);}
.tbtn.rst:hover{background:rgba(255,215,0,.13);}

/* Layout principal */
.main{flex:1;overflow:hidden;display:flex;min-height:0;}
#view-notebook{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.nb-scroll{flex:1;overflow-y:auto;padding:.6rem 0 2rem;}
.nb-scroll::-webkit-scrollbar{width:5px;}
.nb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* Celdas */
.nb-cell{display:flex;margin:.22rem auto;
  width:min(940px,97%);position:relative;
  border-radius:8px;border:1px solid transparent;transition:border-color .15s,box-shadow .15s;}
.nb-cell:hover{border-color:rgba(189,147,249,.18);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.nb-cell.active{border-color:rgba(189,147,249,.45);box-shadow:0 2px 20px rgba(189,147,249,.06);}
.nb-cell.running{border-color:rgba(0,136,255,.5);box-shadow:0 0 18px rgba(0,136,255,.08);}
.nb-cell.qk-cell{border-left:3px solid rgba(0,255,221,.35);}

/* Gutter */
.cell-gutter{width:48px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;padding:.5rem .2rem 0;gap:.25rem;}
.cell-num{font-family:var(--mono);font-size:.56rem;color:var(--mu2);min-width:20px;text-align:center;}
.cell-run-btn{width:23px;height:23px;border-radius:50%;background:transparent;
  border:1px solid var(--bd2);color:var(--mu);font-size:.62rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.nb-cell.active .cell-run-btn{border-color:var(--bl2);color:var(--bl2);}
.cell-run-btn:hover{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);transform:scale(1.12);}
.cell-run-btn.spinning{animation:sp .7s linear infinite;border-color:var(--gr);color:var(--gr);}
@keyframes sp{to{transform:rotate(360deg);}}

/* Cuerpo de celda */
.cell-body{flex:1;display:flex;flex-direction:column;min-width:0;padding:.32rem 0;}
.cell-type-badge{display:inline-flex;align-items:center;gap:.22rem;
  font-family:var(--orb);font-size:.4rem;color:var(--mu);
  padding:.05rem 0 .22rem;margin-bottom:.06rem;letter-spacing:.04em;}
.ctb-code{color:rgba(0,170,255,.7);}
.ctb-md{color:rgba(0,255,136,.7);}

/* Editor de código (CodeMirror) */
.cell-code-area{background:var(--bg2);border:1px solid var(--bd3);border-radius:6px;overflow:hidden;min-height:42px;}
.nb-cell.active .cell-code-area{border-color:rgba(189,147,249,.3);}
.CodeMirror{height:auto;font-family:var(--mono);font-size:.7rem;background:var(--bg2);color:var(--tx2);}
.CodeMirror-gutters{background:var(--bg3);border-right:1px solid var(--bd3);}
.CodeMirror-linenumber{color:var(--mu2);}

/* Output / terminal (estilo Arquitecto Cuántico) */
.cell-output-area{margin-top:.28rem;border-radius:6px;overflow:hidden;
  border:1px solid var(--bd3);background:#050810;}
.out-header{display:flex;align-items:center;gap:.4rem;padding:.25rem .65rem;
  background:rgba(0,0,0,.4);border-bottom:1px solid var(--bd3);font-family:var(--orb);font-size:.4rem;}
.out-header-ok{color:var(--gr);}
.out-header-err{color:var(--rd);}
.out-stdout{padding:.5rem .7rem;font-family:var(--mono);font-size:.67rem;line-height:1.62;
  white-space:pre-wrap;overflow-x:auto;color:#c8e0ff;background:#050810;
  max-height:400px;overflow-y:auto;}
.out-stdout::-webkit-scrollbar{width:4px;height:4px;}
.out-stdout::-webkit-scrollbar-thumb{background:var(--bd2);}
.out-stderr{padding:.5rem .7rem;font-family:var(--mono);font-size:.67rem;line-height:1.62;
  white-space:pre-wrap;color:#ff9999;background:rgba(255,60,60,.04);
  border-top:1px solid rgba(255,68,102,.15);}
.out-circuit-text{padding:.5rem .7rem;font-family:var(--mono);font-size:.65rem;line-height:1.7;
  white-space:pre;overflow-x:auto;color:var(--cl);background:#040d18;
  border-top:1px solid rgba(0,170,255,.1);}
.out-bloch-wrap{padding:.55rem .7rem;background:#04080f;
  border-top:1px solid rgba(0,255,221,.08);display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-start;}
.bloch-item{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.bloch-item canvas{border-radius:50%;box-shadow:0 0 20px rgba(0,136,255,.15);}
.bloch-item-lbl{font-family:var(--mono);font-size:.52rem;color:var(--mu);}
.out-probs{padding:.55rem .7rem;background:#040c18;
  border-top:1px solid rgba(0,136,255,.1);}
.out-probs-title{font-family:var(--orb);font-size:.42rem;color:var(--mu);
  letter-spacing:.06em;margin-bottom:.4rem;}
.prob-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.2rem;
  font-family:var(--mono);font-size:.64rem;}
.prob-state{color:var(--cy);min-width:52px;font-weight:600;}
.prob-bar-bg{flex:1;height:9px;background:rgba(0,136,255,.08);
  border-radius:3px;overflow:hidden;border:1px solid rgba(0,136,255,.1);}
.prob-bar-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,rgba(0,136,255,.8),rgba(0,255,221,.8));}
.prob-pct{color:var(--tx2);min-width:40px;text-align:right;font-size:.62rem;}
.prob-count{color:var(--mu);min-width:45px;text-align:right;font-size:.58rem;}
.out-img{display:block;max-width:100%;border-radius:5px;
  margin:.4rem .6rem;box-shadow:0 4px 20px rgba(0,0,0,.5);}

/* Markdown */
.cell-md-rendered{padding:.55rem .7rem;font-size:.74rem;line-height:1.72;color:var(--tx);}
.cell-md-rendered h1{font-family:var(--orb);font-size:1.05rem;color:var(--bl2);}
.md-split{display:flex;gap:.4rem;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;}
.md-editor-pane{flex:1;border-right:1px solid var(--bd);}
.md-preview-pane{flex:1;padding:.52rem;overflow-y:auto;max-height:360px;}
.cell-md-split-area{width:100%;height:100%;background:var(--bg2);border:none;padding:.52rem;font-family:var(--mono);font-size:.68rem;color:var(--tx2);resize:none;outline:none;}

/* Toolbar */
.cell-toolbar{display:none;position:absolute;top:.25rem;right:.4rem;gap:.15rem;z-index:5;}
.nb-cell:hover .cell-toolbar,.nb-cell.active .cell-toolbar{display:flex;}
body.expo-mode .nb-cell .cell-toolbar{display:none!important;}
body.expo-mode .nb-cell.qk-cell .cell-toolbar{display:flex!important;}
.ct-btn{width:18px;height:18px;border-radius:3px;background:rgba(8,11,20,.9);border:1px solid var(--bd2);color:var(--mu);font-size:.5rem;cursor:pointer;}
.ct-btn:hover{border-color:var(--bl2);color:var(--bl2);}
.cell-restore-btn{display:none;position:absolute;bottom:.25rem;right:.4rem;padding:.1rem .3rem;background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22);border-radius:3px;color:var(--yw);font-size:.4rem;cursor:pointer;}
body.expo-mode .cell-restore-btn{display:block;}

/* Añadir celdas */
.add-cell-row{width:min(940px,97%);margin:.03rem auto;height:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;}
.add-cell-row:hover{opacity:1;}
body.expo-mode .add-cell-row{display:none;}
.add-cell-line{flex:1;height:1px;background:rgba(189,147,249,.15);}
.add-cell-btns{display:flex;gap:.2rem;padding:0 .4rem;}
.add-btn{padding:.09rem .36rem;background:var(--bg);border:1px solid rgba(189,147,249,.25);border-radius:3px;color:var(--pu);font-family:var(--orb);font-size:.38rem;cursor:pointer;}
.nb-bottom{width:min(940px,97%);margin:.35rem auto 2rem;display:flex;gap:.4rem;}
body.expo-mode .nb-bottom{display:none;}
.nb-add-big{flex:1;padding:.48rem;background:transparent;border:1px dashed rgba(189,147,249,.18);border-radius:7px;color:rgba(189,147,249,.5);font-family:var(--orb);font-size:.48rem;cursor:pointer;text-align:center;}

/* Gestión de notebooks */
#view-manage{display:none;flex:1;flex-direction:column;overflow:hidden;}
.manage-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.75rem;padding:.9rem;overflow-y:auto;}
.nb-card{background:var(--p);border:1px solid var(--bd);border-radius:9px;}
.btn-edit-nb,.btn-pub-nb,.btn-del-nb{padding:.38rem;border-radius:5px;cursor:pointer;}

/* Statusbar */
.statusbar{height:20px;display:flex;align-items:center;gap:.55rem;padding:0 .75rem;background:#060a10;border-top:1px solid var(--bd3);font-family:var(--mono);font-size:.5rem;color:var(--mu);}
.sb-dot{width:5px;height:5px;border-radius:50%;}
.sb-idle{background:var(--mu);}
.sb-run{background:var(--gr);animation:puls 1s infinite;}
.sb-err{background:var(--rd);}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--p);border:1px solid rgba(189,147,249,.3);border-radius:11px;padding:1.35rem;width:min(460px,92vw);}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<div class="access-denied" id="access-denied">
  <div class="denied-icon">🔒</div>
  <div class="denied-title">ACCESO RESTRINGIDO</div>
  <div class="denied-desc">Quantum Notebook es exclusivo para<br>
    <strong style="color:var(--pu);">Administradores</strong> y el
    <strong style="color:var(--yw);">Fundador</strong>.
  </div>
  <button class="btn-nav-back" style="margin-top:.5rem;" onclick="postCore('QCOL_NAV',{screen:'home'})">← Volver al menú</button>
</div>

<div class="topbar" id="topbar" style="display:none;">
  <button class="btn-nav-back" id="btn-back" onclick="goBack()">← ATRÁS</button>
  <button class="btn-projects-back" id="btn-projects-back" onclick="goToProjects()">← PROYECTOS</button>
  <div class="tb-sep"></div>
  <div class="tb-logo">
    <span class="tb-q">Q</span><span style="font-family:var(--orb);font-size:.68rem;font-weight:900;color:var(--bl2);">COL</span>
    <span class="tb-pro">QUANTUM NOTEBOOK</span>
  </div>
  <div class="tb-sep"></div>
  <input class="nb-name-inp" id="nb-name-inp" placeholder="Sin título" value="Nuevo Notebook">
  <span id="expo-badge">👁 EXPOSICIÓN</span>
  <div class="tb-right">
    <input type="text" id="engine-url-input" class="engine-url-input" placeholder="https://...hf.space" style="display:none;">
    <div class="eng-pill" id="eng-badge">● SIN COMPILADOR</div>
    <div class="admin-pill" id="admin-pill" style="display:none;">ADMIN+</div>
    <div class="user-pill" id="user-pill">—</div>
  </div>
</div>

<div class="secbar" id="secbar" style="display:none;">
  <button class="stab on" id="stab-1" onclick="setView('notebook')">📝 NOTEBOOK</button>
  <button class="stab" id="stab-2" onclick="setView('manage')">📂 MIS NOTEBOOKS</button>
  <div class="secbar-right">
    <button class="tbtn" id="btn-add-code" onclick="addCellAt(-1,'code')">＋ Código</button>
    <button class="tbtn" id="btn-add-md" onclick="addCellAt(-1,'markdown')">✦ Texto</button>
    <button class="tbtn" id="btn-import" onclick="importNb()">📂 Abrir</button>
    <input type="file" id="import-file" style="display:none;" accept=".ipynb" onchange="handleImport(event)">
    <button class="tbtn" id="btn-download" onclick="downloadNb()">📥 .ipynb</button>
    <button class="tbtn" id="btn-save" onclick="saveCurrentNb(true)">💾 GUARDAR</button>
    <button class="tbtn pub" id="btn-publish" onclick="showPublish()">📤 PUBLICAR</button>
    <button class="tbtn rst" id="btn-restore-all" style="display:none;" onclick="restoreAllCells()">↺ RESTAURAR TODO</button>
    <div style="width:1px;height:14px;background:rgba(255,255,255,.07);margin:0 .05rem;"></div>
    <button class="tbtn run" onclick="runCurCell()" id="btn-run-cur">▶ EJECUTAR</button>
    <button class="tbtn run-all" onclick="runAll()" id="btn-run-all">▶▶ TODO</button>
  </div>
</div>

<div class="main" id="main-area" style="display:none;">
  <div id="view-notebook" style="display:flex;">
    <div class="nb-scroll" id="nb-scroll"></div>
  </div>
  <div id="view-manage">
    <div class="manage-wrap">
      <div class="manage-bar">
        <div class="manage-title-lbl">📂 MIS NOTEBOOKS</div>
        <button class="tbtn" style="margin-left:auto;" onclick="refreshNbs()">🔄</button>
        <button class="tbtn pub" onclick="newNotebook();setView('notebook')">＋ NUEVO</button>
      </div>
      <div class="nb-grid" id="nb-grid"></div>
    </div>
  </div>
</div>

<div class="statusbar" id="statusbar" style="display:none;">
  <div class="sb-dot sb-idle" id="sb-dot"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUANTUM NOTEBOOK v6.0 — Editor profesional + salidas mejoradas
// ═══════════════════════════════════════════════════════════════
let curUser=null,engineURL='',engineOK=false,running=false;
let curView='notebook',cells=[],curCellId=null,execCounter=0;
let _initialized=false,lastSaveTime=Date.now(),debounceTimer=null;
let _expositionMode=false,_originalCells=null;

function postCore(type,data={}){try{window.parent.postMessage({type,...data},'*');}catch(e){}}
function notify(msg,ms=2800){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genId(){return 'c'+Date.now()+Math.random().toString(36).slice(2,6);}

// Navegación
function goBack(){if(_expositionMode){deactivateExpositionMode();postCore('QCOL_NAV',{screen:'projects'});}else{postCore('QCOL_NAV',{screen:'home'});}}
function goToProjects(){postCore('QCOL_NAV',{screen:'projects'});}

// Modo exposición
function activateExpositionMode(){
  _expositionMode=true;_originalCells=JSON.parse(JSON.stringify(cells));
  document.body.classList.add('expo-mode');
  document.getElementById('expo-badge').style.display='inline-flex';
  ['btn-add-code','btn-add-md','btn-import','btn-download','btn-save','btn-publish','stab-2','engine-url-input'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('btn-back').style.display='none';
  document.getElementById('btn-projects-back').style.display='flex';
  document.getElementById('btn-restore-all').style.display='';
  const ni=document.getElementById('nb-name-inp');if(ni){ni.readOnly=true;ni.style.opacity='.6';}
  notify('👁 Modo exposición — ejecuta y experimenta libremente');
}
function deactivateExpositionMode(){
  _expositionMode=false;_originalCells=null;
  document.body.classList.remove('expo-mode');
  document.getElementById('expo-badge').style.display='none';
  ['btn-add-code','btn-add-md','btn-import','btn-download','btn-save','btn-publish','stab-2','engine-url-input'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});
  document.getElementById('btn-back').style.display='flex';
  document.getElementById('btn-projects-back').style.display='none';
  document.getElementById('btn-restore-all').style.display='none';
  const ni=document.getElementById('nb-name-inp');if(ni){ni.readOnly=false;ni.style.opacity='';}
}
function restoreAllCells(){
  if(!_originalCells)return;
  if(!confirm('¿Restaurar todo el código a los valores originales?'))return;
  cells=JSON.parse(JSON.stringify(_originalCells)).map(c=>({...c,output:'',exec_count:null,mdEdit:false}));
  execCounter=0;renderCells();notify('↺ Código restaurado');
}
function restoreCell(id){
  if(!_originalCells)return;
  const idx=cells.findIndex(c=>c.id===id);if(idx<0)return;
  cells[idx]={..._originalCells[idx],id:cells[idx].id,output:'',exec_count:null,mdEdit:false};
  renderCells();notify('↺ Celda restaurada');
}

// Motor
async function checkEngine(){
  const stored=localStorage.getItem('qcol_colab_url');if(stored) engineURL=stored;
  if(!engineURL) return;
  const badge=document.getElementById('eng-badge');
  try{
    const r=await fetch(engineURL+'/run/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[''],fn_index:1}),signal:AbortSignal.timeout(12000)});
    if(r.ok){const j=await r.json();if(j&&j.data){engineOK=true;badge.textContent='● MOTOR ACTIVO';badge.className='eng-pill on';}else throw new Error();}
    else throw new Error('HTTP '+r.status);
  }catch(e){engineOK=false;badge.textContent='● SIN COMPILADOR';badge.className='eng-pill';}
}

// Preámbulo Qiskit
const QISKIT_PREAMBLE=`from qiskit import QuantumCircuit, QuantumRegister, ClassicalRegister, transpile
from qiskit.quantum_info import Statevector, DensityMatrix, Operator
from qiskit.visualization import plot_histogram, plot_bloch_multivector, plot_state_city
try: from qiskit_aer import AerSimulator
except: AerSimulator=None
import numpy as np; from numpy import pi
import matplotlib; matplotlib.use('Agg'); import matplotlib.pyplot as plt
import io, base64
`;

function parseServerResponse(raw){
  let d=null;
  try{const item=raw?.data?.[0];d=(typeof item==='string')?JSON.parse(item):item;}catch(e){d={success:false,output:'Error al parsear'};}
  return d||{success:false,output:'Respuesta vacía'};
}

// Render de output (estilo Arquitecto Cuántico)
function renderOutput(outArea, d, elapsed){
  if(!outArea)return;
  let html='';
  const isOk=d.success!==false;
  const hdrCls=isOk?'out-header-ok':'out-header-err';
  html+=`<div class="out-header ${hdrCls}">${isOk?'✅':'❌'} ${isOk?'Ejecutado':'Error'}${elapsed?' · '+elapsed+'s':''}</div>`;
  if(d.output&&d.output.trim()){
    const lines=d.output.split('\n');
    let circuitBlock=[],textBlock=[],inCircuit=false;
    for(const line of lines){
      const isCircLine=/[─┤├┼╫│┐┘└┌╥╨╩╦╣╠═║╗╚╔╝╞╡╟╢]/.test(line)||/q_?\d+\s*:/.test(line)||/c:\s*\d/.test(line)||/^\s*(q\[|c\[|cr\[|qr\[)/.test(line);
      if(isCircLine){if(!inCircuit&&textBlock.length){html+=buildTextOut(textBlock.join('\n'));textBlock=[];}inCircuit=true;circuitBlock.push(line);}
      else{if(inCircuit){html+=buildCircuitOut(circuitBlock.join('\n'));circuitBlock=[];inCircuit=false;}textBlock.push(line);}
    }
    if(inCircuit)html+=buildCircuitOut(circuitBlock.join('\n'));
    if(textBlock.length)html+=buildTextOut(textBlock.join('\n'));
  }
  if(d.stderr)html+=`<div class="out-stderr">${escH(d.stderr)}</div>`;
  if(d.bloch?.probabilities)html+=buildProbsOut(d.bloch.probabilities,d.bloch.shots||1024);
  else if(d.counts)html+=buildProbsOut(d.counts,d.bloch?.shots||1024);
  if(d.bloch?.probabilities)html+=buildBlochOut(d.bloch.probabilities);
  if(d.plot_png)html+=`<div style="padding:.3rem .5rem;background:#04080e;"><img class="out-img" src="data:image/png;base64,${d.plot_png}"></div>`;
  if(!isOk&&d.output)html+=buildErrorOut(d.output);
  outArea.innerHTML=html||'<div class="out-stdout" style="color:var(--mu);">Sin salida</div>';
}

function buildTextOut(text){
  if(!text.trim())return'';
  const lines=text.split('\n');
  return`<div class="out-stdout">╔════════════════════════════╗\n${lines.map(l=>`║ ${l}`).join('\n')}\n╚════════════════════════════╝</div>`;
}
function buildCircuitOut(text){
  let colored=escH(text);
  colored=colored.replace(/([HXYZSTshxyzts])\s*(?=─|├|┤|\s)/g,'<span style="color:#00aaff;font-weight:700">$1</span>');
  colored=colored.replace(/(cx|cy|cz|ch|rx|ry|rz|ccx|mcx)\s*(?=[\s─])/gi,'<span style="color:#00ffdd;font-weight:700">$1</span>');
  colored=colored.replace(/(M)\s*(?=[─├┤])/g,'<span style="color:#ff9580;font-weight:700">$1</span>');
  return`<div class="out-circuit-text">${colored}</div>`;
}
function buildProbsOut(probs,shots){
  const entries=Object.entries(probs).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);
  const rows=entries.map(([st,v])=>{
    const prob=v>1?v/total:v;
    const count=v>1?v:Math.round(v*shots);
    const pct=(prob*100).toFixed(1);
    return`<div class="prob-row"><span class="prob-state">|${escH(st)}⟩</span><div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${Math.round(prob*100)}%"></div></div><span class="prob-pct">${pct}%</span><span class="prob-count">${count}/${shots}</span></div>`;
  }).join('');
  return`<div class="out-probs"><div class="out-probs-title">RESULTADOS · ${shots} shots</div>${rows}</div>`;
}
function buildBlochOut(probs){
  const qubits=Object.keys(probs)[0]?.length||0;
  const total=Object.values(probs).reduce((s,v)=>s+v,0);
  const spheres=[];
  for(let qi=0;qi<Math.min(qubits,8);qi++){
    let p0=0;
    Object.entries(probs).forEach(([s,p])=>{const bit=s.length>qi?s[s.length-1-qi]:'0';if(bit==='0')p0+=(p>1?p/total:p);});
    const theta=2*Math.acos(Math.min(1,Math.sqrt(Math.max(0,p0))));
    const cid='bloch-'+genId();
    setTimeout(()=>drawBlochSphere(cid,theta),50);
    spheres.push(`<div class="bloch-item"><canvas id="${cid}" width="90" height="90"></canvas><div class="bloch-item-lbl">q[${qi}] P₀=${(p0*100).toFixed(0)}%</div></div>`);
  }
  return`<div class="out-bloch-wrap">${spheres.join('')}</div>`;
}
function drawBlochSphere(canvasId,theta){
  const c=document.getElementById(canvasId);if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h/2,r=w*0.38;
  ctx.clearRect(0,0,w,h);
  const bg=ctx.createRadialGradient(cx,cy-r*.2,r*.1,cx,cy,r);bg.addColorStop(0,'#0d1a2e');bg.addColorStop(1,'#040810');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(0,136,255,.35)';ctx.stroke();
  const x=r*Math.sin(theta),y=-r*Math.cos(theta);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+x,cy+y);ctx.strokeStyle='#00ffdd';ctx.lineWidth=2.2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx+x,cy+y,5,0,Math.PI*2);ctx.fillStyle='#00ffdd';ctx.fill();
  ctx.font='bold 9px JetBrains Mono';ctx.fillStyle='rgba(138,160,196,.8)';ctx.fillText('|0⟩',cx+3,cy-r-3);ctx.fillText('|1⟩',cx+3,cy+r+11);
}
function buildErrorOut(errText){
  return`<div class="out-stderr">${escH(errText)}</div>`;
}

// Ejecución
async function runCell(id){
  if(!_expositionMode&&!requireAuth())return;
  if(running){notify('Ya hay una ejecución en curso');return;}
  const cell=cells.find(c=>c.id===id);
  if(!cell||cell.type!=='code')return;
  const cm=document.querySelector(`#area-${id} .CodeMirror`).CodeMirror;
  if(cm) cell.code=cm.getValue();
  const code=(cell.code||'').trim();
  if(!code)return;
  running=true;setSbRun(true);
  const rbtn=document.getElementById('rbtn-'+id);if(rbtn)rbtn.classList.add('spinning');
  const outArea=document.getElementById('out-'+id);
  if(outArea)outArea.innerHTML='<div class="out-stdout">⚙️ Ejecutando…</div>';
  const t0=Date.now();
  try{
    if(engineOK&&engineURL){
      const fullCode=(cell.type==='qiskit'?QISKIT_PREAMBLE+'\n':'')+code;
      const resp=await fetch(engineURL+'/run/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[fullCode],fn_index:1}),signal:AbortSignal.timeout(90000)});
      const raw=await resp.json();
      const d=parseServerResponse(raw);
      execCounter++;cell.exec_count=execCounter;
      renderOutput(outArea,d,((Date.now()-t0)/1000).toFixed(2));
      setSbRun(false,'✅ Completado');
    }else{
      execCounter++;cell.exec_count=execCounter;
      outArea.innerHTML='<div class="out-stdout">⚡ Sin motor — configura en panel Fundador</div>';
      setSbRun(false,'Sin motor');
    }
  }catch(e){
    outArea.innerHTML=`<div class="out-stderr">❌ ${escH(e.message)}</div>`;
    setSbRun(false,'❌ Error','err');
  }
  running=false;if(rbtn)rbtn.classList.remove('spinning');
  renderCellNum(id);
}
function renderCellNum(id){const cell=cells.find(c=>c.id===id);if(!cell)return;const el=document.querySelector(`[data-id="${id}"] .cell-num`);if(el)el.textContent=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';}
async function runCurCell(){if(curCellId)await runCell(curCellId);}
async function runAll(){for(const cell of cells)if(cell.type==='code'){await runCell(cell.id);await new Promise(r=>setTimeout(r,200));}}
function setSbRun(r,msg='',st=''){const dot=document.getElementById('sb-dot');dot.className='sb-dot '+(r?'sb-run':st==='err'?'sb-err':'sb-idle');if(msg)document.getElementById('sb-txt').textContent=msg;}

// Guardado y gestión
function saveCurrentNb(showNotify=true){
  if(_expositionMode||!curUser)return;
  cells.forEach(c=>{const cm=document.querySelector(`#area-${c.id} .CodeMirror`);if(cm) c.code=cm.CodeMirror.getValue();});
  const name=document.getElementById('nb-name-inp').value||'Sin título';
  const key='qcol_nbs_'+(curUser.username||'dev');
  const nbs=JSON.parse(localStorage.getItem(key)||'[]');
  const idx=nbs.findIndex(n=>n.name===name);
  const entry={name,cells:JSON.parse(JSON.stringify(cells)),saved:new Date().toISOString()};
  if(idx>=0)nbs[idx]=entry;else nbs.unshift(entry);
  localStorage.setItem(key,JSON.stringify(nbs.slice(0,50)));
  lastSaveTime=Date.now();
  document.getElementById('sb-save-status').textContent='💾 Guardado';
  if(showNotify)notify('💾 Guardado: '+name);
}
function newNotebook(){if(!confirm('¿Crear nuevo notebook?'))return;cells=[];execCounter=0;document.getElementById('nb-name-inp').value='Nuevo Notebook';addCellAt(-1,'code');notify('✅ Nuevo notebook');}
function importNb(){document.getElementById('import-file').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const nb=JSON.parse(ev.target.result);
      cells=[];execCounter=0;
      document.getElementById('nb-name-inp').value=nb.metadata?.name||file.name.replace('.ipynb','');
      (nb.cells||[]).forEach(c=>{
        const src=Array.isArray(c.source)?c.source.join(''):c.source||'';
        cells.push({id:genId(),type:c.cell_type==='markdown'?'markdown':'code',code:src,output:'',exec_count:null,mdEdit:false});
      });
      if(cells.length===0)addCellAt(-1,'code');
      renderCells();setView('notebook');notify('✅ Importado');
    }catch(err){notify('❌ '+err.message);}
  };
  reader.readAsText(file);e.target.value='';
}
function downloadNb(){
  if(_expositionMode){notify('Descarga desactivada en exposición');return;}
  const name=document.getElementById('nb-name-inp').value||'qcol_notebook';
  cells.forEach(c=>{const cm=document.querySelector(`#area-${c.id} .CodeMirror`);if(cm) c.code=cm.CodeMirror.getValue();});
  const nb={nbformat:4,nbformat_minor:5,cells:cells.map(c=>({cell_type:c.type,source:[c.code],metadata:{},outputs:[],execution_count:c.exec_count}))};
  const blob=new Blob([JSON.stringify(nb,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.ipynb';a.click();notify('📥 '+a.download);
}
function refreshNbs(){
  const grid=document.getElementById('nb-grid');if(!grid)return;
  const nbs=JSON.parse(localStorage.getItem('qcol_nbs_'+(curUser?.username||'dev'))||'[]');
  grid.innerHTML=nbs.map(nb=>`<div class="nb-card"><div class="nb-card-hdr"><div class="nb-card-title">${escH(nb.name)}</div></div><div class="nb-card-actions"><button onclick="loadNb('${escH(nb.name)}')">📝 Editar</button><button onclick="deleteNb('${escH(nb.name)}')">🗑</button></div></div>`).join('')||'<div class="nb-empty-state">Sin notebooks</div>';
}

function deleteNb(name){/* ... */}

// Render celdas con CodeMirror
function renderCells(){
  const scroll=document.getElementById('nb-scroll');scroll.innerHTML='';
  if(cells.length===0){scroll.innerHTML='<div class="empty-notebook-msg">📓 Sin celdas. <button onclick="addCellAt(-1,\'code\')">＋ Añadir</button></div>';return;}
  cells.forEach((cell,i)=>{
    if(i>0) scroll.appendChild(buildAddRow(i-1));
    const el=buildCellEl(cell,i);scroll.appendChild(el);
  });
  scroll.appendChild(buildAddRow(cells.length-1));
  if(curCellId) focusCell(curCellId);
  updateStatus();
}
function buildAddRow(idx){const d=document.createElement('div');d.className='add-cell-row';d.innerHTML=`<div class="add-cell-line"></div><div class="add-cell-btns"><button class="add-btn" onclick="addCellAt(${idx},'code')">＋ Código</button><button class="add-btn" onclick="addCellAt(${idx},'markdown')">＋ Texto</button></div><div class="add-cell-line"></div>`;return d;}
function buildCellEl(cell,i){
  const el=document.createElement('div');el.className='nb-cell'+(curCellId===cell.id?' active':'');el.dataset.id=cell.id;
  el.innerHTML=`<div class="cell-toolbar">...</div><div class="cell-gutter"><div class="cell-num">${cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]'}</div><button class="cell-run-btn" id="rbtn-${cell.id}" onclick="runCell('${cell.id}')">▶</button></div><div class="cell-body"><div class="cell-type-badge ${cell.type==='code'?'ctb-code':'ctb-md'}">${cell.type==='code'?'{ } Python':'✦ Markdown'}</div><div class="cell-code-area" id="area-${cell.id}"></div><div class="cell-output-area" id="out-${cell.id}"></div></div>`;
  setTimeout(()=>{
    const area=document.getElementById(`area-${cell.id}`);
    if(cell.type==='code'){
      const cm=CodeMirror(area,{value:cell.code||'',mode:'python',theme:'dracula',lineNumbers:true,indentUnit:4,tabSize:4,autoCloseBrackets:true,matchBrackets:true,extraKeys:{'Shift-Enter':()=>runCell(cell.id),'Ctrl-Enter':()=>runCell(cell.id),'Ctrl-S':()=>saveCurrentNb(true)}});
      cm.on('change',()=>{cell.code=cm.getValue();autoSaveDebounced();});
      area.cm=cm;
    }else{
      // Markdown editor (simplificado)
    }
  },10);
  return el;
}
function addCellAt(idx,type){if(_expositionMode)return;const cell={id:genId(),type,code:'',output:'',exec_count:null};if(idx===-1)cells.push(cell);else cells.splice(idx+1,0,cell);renderCells();focusCell(cell.id);}
function focusCell(id){curCellId=id;document.querySelectorAll('.nb-cell').forEach(el=>el.classList.toggle('active',el.dataset.id===id));const cm=document.querySelector(`#area-${id} .CodeMirror`)?.CodeMirror;if(cm)cm.focus();}
function autoSaveDebounced(){clearTimeout(debounceTimer);debounceTimer=setTimeout(()=>{if(!_expositionMode&&curUser)saveCurrentNb(false);},2000);}
function updateStatus(){document.getElementById('sb-cells-info').textContent=cells.length+' celdas';}

function showUI(user){
  const role=user?.role||'guest';
  if(role!=='admin'&&role!=='founder'&&!_expositionMode){document.getElementById('access-denied').classList.add('show');return;}
  document.getElementById('access-denied').classList.remove('show');
  ['topbar','secbar','main-area','statusbar'].forEach(id=>document.getElementById(id).style.display='flex');
  curUser=user;checkEngine();refreshNbs();if(cells.length===0)addCellAt(-1,'code');
}
function requireAuth(){if(!curUser||(curUser.role!=='admin'&&curUser.role!=='founder')){notify('Requiere Admin/Founder');postCore('QCOL_LOGIN');return false;}return true;}

window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='QCOL_USER')showUI(d.user);
  if(d.type==='QCOL_LOAD_NB'&&d.nb){
    if(!d.expositionMode&&!requireAuth())return;
    cells=d.nb.cells.map(c=>({...c,id:genId(),output:'',exec_count:null}));
    document.getElementById('nb-name-inp').value=d.nb.title||'Sin título';
    renderCells();setView('notebook');
    if(d.expositionMode)activateExpositionMode();else deactivateExpositionMode();
  }
});
postCore('QCOL_GET_USER');
setTimeout(()=>{if(!_initialized)showUI(null);},1000);
</script>
