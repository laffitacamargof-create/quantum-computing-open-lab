<style>
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#0d1220;
  --p:#111827;--p2:#1a2540;
  --bd:#1e3058;--bd2:#254070;
  --bl:#0088ff;--bl2:#00aaff;--cy:#00ffdd;
  --gr:#00ff88;--yw:#ffd700;--rd:#ff4466;--pu:#bd93f9;
  --tx:#e2ecff;--tx2:#aabcda;--mu:#4a6a9a;--mu2:#2a3a5a;
  --kw:#ff79c6;--fn:#50fa7b;--st:#f1fa8c;--nm:#bd93f9;--cm:#636e8a;--cl:#8be9fd;
  --orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--ex:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ex);}
body{display:flex;flex-direction:column;overflow:hidden;}

.notif{position:fixed;top:.7rem;right:.7rem;z-index:9999;padding:.5rem .9rem;
  background:rgba(10,14,26,.97);border:1px solid var(--cy);border-radius:8px;
  font-family:var(--orb);font-size:.58rem;color:var(--cy);
  transform:translateX(130%);transition:transform .3s;pointer-events:none;}
.notif.show{transform:translateX(0);}

.access-denied{display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;z-index:100;
  text-align:center;gap:1.2rem;}
.access-denied.show{display:flex;}
.denied-icon{font-size:3rem;opacity:.4;}
.denied-title{font-family:var(--orb);font-size:1rem;color:var(--rd);}
.denied-desc{font-size:.75rem;color:var(--mu);max-width:340px;line-height:1.7;}
.btn-back{padding:.48rem 1.1rem;background:linear-gradient(135deg,#003388,var(--bl));
  border:none;border-radius:8px;color:#fff;font-family:var(--orb);font-size:.65rem;cursor:pointer;}

.topbar{height:38px;display:flex;align-items:center;gap:.5rem;padding:0 .8rem;background:#080b14;
  border-bottom:1px solid rgba(189,147,249,.18);flex-shrink:0;position:relative;z-index:10;}
.tb-logo{display:flex;align-items:center;gap:.35rem;margin-right:.5rem;}
.tb-q{font-family:var(--orb);font-size:.72rem;font-weight:900;color:var(--cy);}
.tb-pro{font-family:var(--orb);font-size:.48rem;color:var(--pu);letter-spacing:.06em;}
.tb-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0;}
.nb-name-inp{background:transparent;border:none;outline:none;font-family:var(--mono);font-size:.72rem;color:var(--tx);
  min-width:80px;max-width:220px;padding:.1rem .3rem;border-radius:4px;cursor:text;}
.nb-name-inp:focus{background:rgba(255,255,255,.05);color:var(--cy);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.3rem;}
.engine-url-input{display:none;}
.eng-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.44rem;
  background:rgba(74,106,154,.1);border:1px solid rgba(74,106,154,.25);color:var(--mu);}
.eng-pill.on{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.35);color:var(--gr);
  animation:puls 2.5s infinite;}
@keyframes puls{0%,100%{border-color:rgba(0,255,136,.35);}50%{border-color:rgba(0,255,136,.8);}}
.user-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.46rem;
  background:rgba(189,147,249,.08);border:1px solid rgba(189,147,249,.2);color:var(--pu);}
.admin-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.44rem;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);color:var(--yw);}

.secbar{height:32px;display:flex;align-items:stretch;background:#080b14;border-bottom:1px solid var(--bd);flex-shrink:0;padding:0 .5rem;gap:.1rem;}
.stab{display:flex;align-items:center;gap:.3rem;padding:0 .75rem;background:transparent;border:none;color:var(--mu);
  font-family:var(--orb);font-size:.48rem;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.stab.on{color:var(--pu);border-bottom-color:var(--pu);}
.secbar-right{margin-left:auto;display:flex;align-items:center;gap:.3rem;padding:0 .3rem;}
.tbtn{display:flex;align-items:center;gap:.3rem;padding:.25rem .6rem;background:transparent;
  border:1px solid var(--bd2);border-radius:5px;color:var(--mu);font-family:var(--orb);font-size:.48rem;
  cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--bl2);color:var(--bl2);background:rgba(0,136,255,.06);}
.tbtn.run{background:linear-gradient(135deg,#003388,var(--bl));border-color:var(--bl);color:#fff;}
.tbtn.run-all{background:linear-gradient(135deg,#004400,#00aa44);border-color:#00aa44;color:#fff;}
.tbtn.pub{background:linear-gradient(135deg,#3a0075,var(--pu));border-color:var(--pu);color:#fff;}

.main{flex:1;overflow:hidden;display:flex;min-height:0;}
#view-notebook{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.nb-scroll{flex:1;overflow-y:auto;padding:.8rem 0;}
.nb-scroll::-webkit-scrollbar{width:5px;}
.nb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

.nb-cell{display:flex;margin:.2rem auto;width:min(900px,96%);position:relative;border-radius:8px;border:1px solid transparent;transition:border-color .15s;}
.nb-cell:hover{border-color:rgba(189,147,249,.15);}
.nb-cell.active{border-color:rgba(189,147,249,.4);}
.cell-gutter{width:52px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:.6rem .3rem 0;gap:.3rem;}
.cell-num{font-family:var(--mono);font-size:.6rem;color:var(--mu);min-width:22px;text-align:center;transition:color 0.2s;}
.cell-num.error{color:#ff4466; font-weight:bold;}
.cell-run-btn{width:26px;height:26px;border-radius:50%;background:transparent;border:1px solid var(--bd2);
  color:var(--mu);font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cell-run-btn:hover{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);transform:scale(1.1);}
.cell-run-btn.spinning{border-color:var(--gr);color:var(--gr);animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.cell-body{flex:1;display:flex;flex-direction:column;min-width:0;padding:.4rem 0;}
.cell-type-badge{display:inline-flex;align-items:center;gap:.3rem;font-family:var(--orb);font-size:.44rem;color:var(--mu);padding:.08rem 0 .3rem;}
.ctb-code{color:var(--bl2);}.ctb-md{color:var(--gr);}
.cell-code-area{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;overflow:hidden;min-height:48px;}
.cell-output-area{margin-top:.35rem;background:#060a10;border:1px solid var(--bd);border-radius:6px;font-family:var(--mono);overflow:hidden;}
.out-text{padding:.55rem .8rem;font-size:.68rem;line-height:1.65;white-space:pre-wrap;max-height:280px;overflow-y:auto;border-bottom:1px solid var(--bd);margin:0;}
.out-err{color:#ff88aa;background:rgba(255,68,102,.05);}
.md-split{display:flex;gap:.5rem;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;min-height:150px;}
.md-editor-pane{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--bd);}
.md-preview-pane{flex:1;padding:.6rem;overflow-y:auto;max-height:400px;font-size:.75rem;line-height:1.6;color:var(--tx2);}
.md-preview-pane h1{font-family:var(--orb);font-size:1rem;color:var(--bl2);}
.md-preview-pane code{background:rgba(0,136,255,.1);padding:.1rem .3rem;border-radius:3px;font-family:var(--mono);color:var(--cy);}
.md-preview-pane pre{background:var(--bg);padding:.5rem;border-radius:5px;overflow-x:auto;}
.cell-md-split-area{width:100%;background:var(--bg2);border:none;padding:.6rem;font-family:var(--mono);font-size:.72rem;line-height:1.65;color:var(--tx2);resize:vertical;outline:none;}
.cell-md-rendered{padding:.6rem;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;cursor:pointer;}
.cell-toolbar{display:none;position:absolute;top:.3rem;right:.5rem;gap:.2rem;z-index:5;}
.nb-cell:hover .cell-toolbar,.nb-cell.active .cell-toolbar{display:flex;}
.ct-btn{width:20px;height:20px;border-radius:4px;background:rgba(10,14,26,.85);border:1px solid var(--bd2);color:var(--mu);font-size:.55rem;cursor:pointer;}
.ct-btn:hover{border-color:var(--bl2);color:var(--bl2);}
.add-cell-row{width:min(900px,96%);margin:.05rem auto;height:18px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.add-cell-row:hover{opacity:1;}
.add-cell-line{flex:1;height:1px;background:rgba(189,147,249,.2);}
.add-cell-btns{display:flex;gap:.25rem;padding:0 .5rem;}
.add-btn{padding:.12rem .45rem;background:var(--bg);border:1px solid rgba(189,147,249,.3);border-radius:4px;color:var(--pu);font-family:var(--orb);font-size:.42rem;cursor:pointer;}
.nb-bottom{width:min(900px,96%);margin:.5rem auto 2rem;display:flex;gap:.5rem;}
.nb-add-big{flex:1;padding:.55rem;background:transparent;border:1px dashed rgba(189,147,249,.2);border-radius:8px;color:var(--pu);font-family:var(--orb);font-size:.52rem;cursor:pointer;text-align:center;}
.nb-add-big:hover{background:rgba(189,147,249,.06);border-color:rgba(189,147,249,.5);}
.empty-placeholder{text-align:center;padding:3rem;color:var(--mu);font-family:var(--orb);}
.statusbar{height:22px;display:flex;align-items:center;gap:.65rem;padding:0 .85rem;background:#060a10;border-top:1px solid var(--bd);font-family:var(--mono);font-size:.52rem;color:var(--mu);flex-shrink:0;}
.sb-dot{width:5px;height:5px;border-radius:50%;}.sb-idle{background:var(--mu);}.sb-run{background:var(--gr);animation:puls 1.5s infinite;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--p);border:1px solid rgba(189,147,249,.35);border-radius:12px;padding:1.5rem;width:min(480px,92vw);}
.modal-title{font-family:var(--orb);font-size:.82rem;color:var(--pu);margin-bottom:1rem;}
.fg{margin-bottom:.7rem;}
.fl{font-family:var(--orb);font-size:.5rem;color:var(--mu);display:block;margin-bottom:.2rem;}
.fi{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--bd2);border-radius:7px;padding:.45rem .72rem;color:var(--tx);font-family:var(--mono);font-size:.72rem;outline:none;}
.btn-row{display:flex;gap:.4rem;margin-top:.65rem;}
.btn-pri{padding:.4rem .9rem;background:linear-gradient(135deg,#4a0a8a,var(--pu));border:none;border-radius:6px;color:#fff;font-family:var(--orb);font-size:.56rem;cursor:pointer;}
.btn-cancel{padding:.4rem .85rem;background:transparent;border:1px solid var(--bd2);border-radius:7px;color:var(--mu);cursor:pointer;}
#view-manage{display:none;flex:1;flex-direction:column;overflow:hidden;}
.manage-wrap{display:flex;flex-direction:column;height:100%;}
.manage-bar{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;background:var(--p);border-bottom:1px solid var(--bd);}
.nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.85rem;padding:1.1rem;overflow-y:auto;}
.nb-card{background:var(--p);border:1px solid var(--bd);border-radius:10px;transition:all .25s;}
.nb-card:hover{border-color:rgba(189,147,249,.4);}
.nb-card-hdr{padding:.65rem .9rem;background:#080b14;border-bottom:1px solid rgba(189,147,249,.15);display:flex;justify-content:space-between;}
.nb-card-title{font-family:var(--orb);font-size:.65rem;}
.nb-card-actions{display:flex;gap:.3rem;margin-top:.5rem;}
.btn-edit-nb,.btn-pub-nb,.btn-del-nb{padding:.42rem;border-radius:6px;font-family:var(--orb);font-size:.52rem;cursor:pointer;}
#view-files{display:none;flex:1;flex-direction:column;overflow:hidden;}
.fi-row{transition:background .15s;border-bottom:1px solid rgba(30,48,88,.3);}
.fi-row:hover{background:rgba(0,136,255,.06);}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<div class="access-denied" id="access-denied"><div class="denied-icon">🔒</div><div class="denied-title">ACCESO RESTRINGIDO</div><div class="denied-desc">Solo Administradores y Fundador</div><button class="btn-back" onclick="postCore('QCOL_NAV',{screen:'home'})">← Volver</button></div>
<div class="topbar" id="topbar" style="display:none;"><div class="tb-logo"><span class="tb-q">Q</span><span style="font-family:var(--orb);font-size:.72rem;font-weight:900;color:var(--bl2);">COL</span><span class="tb-pro">PRO</span></div><div class="tb-sep"></div><input class="nb-name-inp" id="nb-name-inp" placeholder="Sin título" value="Nuevo Notebook"><div class="tb-right"><input type="text" id="engine-url-input" class="engine-url-input" placeholder="URL motor"><div class="eng-pill" id="eng-badge">● SIN COMPILADOR</div><div class="admin-pill" id="admin-pill" style="display:none;">ADMIN+</div><div class="user-pill" id="user-pill">—</div></div></div>
<div class="secbar" id="secbar" style="display:none;"><button class="stab on" id="stab-1" onclick="setView('notebook')">📝 NOTEBOOK</button><button class="stab" id="stab-2" onclick="setView('manage')">📂 MIS NOTEBOOKS</button><button class="stab" id="stab-3" onclick="setView('files')">📁 ARCHIVOS</button><div class="secbar-right"><button class="tbtn" onclick="addCellAt(-1,'code')">＋ Código</button><button class="tbtn" onclick="addCellAt(-1,'markdown')">＋ Texto</button><button class="tbtn" onclick="importNb()">📂 Abrir .ipynb</button><input type="file" id="import-file" style="display:none;" accept=".ipynb" onchange="handleImport(event)"><button class="tbtn" onclick="downloadNb()">📥 .ipynb</button><button class="tbtn" onclick="saveCurrentNb(true)">💾 GUARDAR</button><button class="tbtn pub" onclick="showPublish()">📤 PUBLICAR</button><div style="width:1px;height:18px;background:var(--bd);margin:0 .1rem;"></div><button class="tbtn run" onclick="runCurCell()">▶ EJECUTAR</button><button class="tbtn run-all" onclick="runAll()">▶▶ TODO</button></div></div>
<div class="main" id="main-area" style="display:none;"><div id="view-notebook" style="display:flex;"><div class="nb-scroll" id="nb-scroll"><div class="nb-bottom"><button class="nb-add-big" onclick="addCellAt(-1,'code')">＋ Añadir celda de código</button><button class="nb-add-big" onclick="addCellAt(-1,'markdown')">＋ Añadir celda de texto</button></div></div></div><div id="view-manage"><div class="manage-wrap"><div class="manage-bar"><div class="manage-title-lbl">📂 MIS NOTEBOOKS</div><button class="tbtn" style="margin-left:auto;" onclick="refreshNbs()">🔄 Actualizar</button><button class="tbtn pub" onclick="newNotebook();setView('notebook')">＋ NUEVO</button></div><div class="nb-grid" id="nb-grid"></div></div></div><div id="view-files"><div style="display:flex;align-items:center;gap:.4rem;padding:.5rem .8rem;background:#0a0e1a;border-bottom:1px solid #1e3058;flex-shrink:0;"><div style="font-family:var(--orb);font-size:.58rem;color:var(--pu);">📁 GESTOR DE ARCHIVOS</div><span id="file-path-display" style="font-family:var(--mono);font-size:.56rem;color:var(--mu);margin-left:.5rem;">/ raíz</span><div style="margin-left:auto;display:flex;gap:.3rem;"><button class="tbtn" onclick="fileNewFolder()">📁+ Carpeta</button><button class="tbtn" onclick="filePaste()" id="btn-paste" style="display:none;">📋 Pegar</button></div></div><div id="file-tree" style="flex:1;overflow-y:auto;padding:.5rem;"></div></div></div>
<div class="statusbar" id="statusbar" style="display:none;"><div class="sb-dot sb-idle" id="sb-dot"></div><span id="sb-txt">Listo</span><span>Python · Qiskit</span><div class="sb-right"><span id="sb-cells-info">0 celdas</span><span id="sb-save-status">─</span></div></div>
<div class="modal-ov" id="pub-modal"><div class="modal"><div class="modal-title">📤 Publicar Notebook</div><div class="fg"><label class="fl">TÍTULO</label><input class="fi" id="pub-title" placeholder="Nombre"></div><div class="fg"><label class="fl">DESCRIPCIÓN</label><textarea class="fi" id="pub-desc" placeholder="Descripción..."></textarea></div><div class="fg"><label class="fl">TOKEN GITHUB (opcional)</label><input class="fi" id="github-token" placeholder="ghp_xxxx" type="password"></div><div class="btn-row"><button class="btn-pri" onclick="publishNb()">📤 Publicar (GitHub + Local)</button><button class="btn-cancel" onclick="closePublish()">Cancelar</button></div></div></div>
<script>
// ==================== QCOL ARCHITECT PRO — TERMINAL NORMAL + GESTOR ARCHIVOS ====================
let STANDALONE = window.parent===window, curUser=null, engineURL='', engineOK=false, running=false, curView='notebook', cells=[], curCellId=null, execCounter=0, _initialized=false, lastSaveTime=Date.now();
let undoStack=[], redoStack=[], isUndoRedo=false;
let autoSaveTimer=null;
let _expositionMode = false;

function postCore(type,data){ try{ window.parent.postMessage({type,...data},'*'); }catch(e){} }
function notify(msg,ms=2800){ const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }

// undo/redo
function pushUndo(){ if(isUndoRedo) return; undoStack.push(JSON.parse(JSON.stringify(cells))); if(undoStack.length>50) undoStack.shift(); redoStack=[]; }
function undo(){ if(undoStack.length===0) return; isUndoRedo=true; redoStack.push(JSON.parse(JSON.stringify(cells))); cells=undoStack.pop(); renderCells(); isUndoRedo=false; notify('↩️ Deshacer'); }
function redo(){ if(redoStack.length===0) return; isUndoRedo=true; undoStack.push(JSON.parse(JSON.stringify(cells))); cells=redoStack.pop(); renderCells(); isUndoRedo=false; notify('↪️ Rehacer'); }

// engine
async function checkEngine(){ if(!engineURL) return; const badge=document.getElementById('eng-badge'); try{ const resp=await fetch(engineURL+'/run/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:['print("ok")'], fn_index:1}),signal:AbortSignal.timeout(8000)}); if(resp.ok){ engineOK=true; badge.textContent='● MOTOR ACTIVO'; badge.className='eng-pill on'; } else throw new Error(); }catch(e){ engineOK=false; badge.textContent='● SIN COMPILADOR'; badge.className='eng-pill'; } }
function setEngineURL(url){ engineURL=url; localStorage.setItem('qcol_colab_url',url); checkEngine(); notify('🌐 Motor actualizado'); }

// runCell con salida normal, tabla de probabilidades e imagen
async function runCell(id) {
  if(!_expositionMode && !requireAuth()) return;
  if (running) { notify('Ejecución en curso'); return; }
  const cell = cells.find(c => c.id === id);
  if (!cell || cell.type !== 'code') return;
  syncCellCode(id);
  const code = cell.code.trim();
  if (!code) return;
  running = true;
  setSbRun(true);
  const rbtn = document.getElementById('rbtn-' + id);
  if (rbtn) rbtn.classList.add('spinning');
  const outArea = document.getElementById(`output-area-${id}`);
  if (outArea) outArea.innerHTML = '<div class="out-text out-inf">⚙️ Ejecutando...</div>';
  cell.hasError = false;
  renderCellNum(id);
  try {
    if (engineOK && engineURL) {
      const resp = await fetch(engineURL + '/run/predict', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [code], fn_index: 1 }),
        signal: AbortSignal.timeout(90000)
      });
      const raw = await resp.json();
      let payload = (raw.data && raw.data[0]) ? raw.data[0] : raw;
      execCounter++;
      cell.exec_count = execCounter;
      let outHtml = '';
      let isError = false;
      if (payload.stderr) {
        outHtml += `<div class="out-text out-err">${escapeHtml(payload.stderr)}</div>`;
        isError = true;
      } else if (payload.stdout) {
        outHtml += `<div class="out-text">${escapeHtml(payload.stdout)}</div>`;
      } else if (typeof payload === 'string') {
        outHtml += `<div class="out-text">${escapeHtml(payload)}</div>`;
      } else {
        outHtml += `<div class="out-text">✅ Ejecución completada</div>`;
      }
      // Probabilidades (sin canvas)
      if (payload.bloch && payload.bloch.probabilities) {
        const probs = payload.bloch.probabilities;
        const rows = Object.entries(probs).sort((a,b)=>b[1]-a[1]).map(([st, p]) => {
          const pct = (p*100).toFixed(1);
          const bar = '█'.repeat(Math.round(p*20));
          return `<tr><td style="font-family:var(--mono);color:#00ffdd;padding:.15rem .5rem;">|${st}⟩</td><td style="font-family:var(--mono);color:#0088ff;padding:.15rem .5rem;">${bar}</td><td style="font-family:var(--mono);color:#e2ecff;padding:.15rem .5rem;">${pct}%</td></tr>`;
        }).join('');
        outHtml += `<div style="background:#090d18;border:1px solid #1e3058;border-radius:6px;padding:.5rem;margin-top:.4rem;"><div style="font-family:var(--orb);font-size:.5rem;color:#4a6a9a;">PROBABILIDADES</div><table style="border-collapse:collapse;">${rows}</table></div>`;
      }
      // Imagen matplotlib
      if (payload.plot_png && typeof payload.plot_png === 'string' && payload.plot_png.length > 100) {
        outHtml += `<img src="data:image/png;base64,${payload.plot_png}" style="max-width:100%;border-radius:6px;margin-top:.4rem;display:block;">`;
      }
      cell.hasError = isError;
      outArea.innerHTML = outHtml;
      setSbRun(false, '✅ Completado');
    } else {
      await new Promise(r=>setTimeout(r,600));
      execCounter++;
      cell.exec_count = execCounter;
      outArea.innerHTML = '<div class="out-text out-inf">⚡ Simulación local · Conecta un motor</div>';
      setSbRun(false, 'Simulación local');
    }
  } catch(e) {
    outArea.innerHTML = `<div class="out-text out-err">❌ ${escapeHtml(e.message)}</div>`;
    cell.hasError = true;
    setSbRun(false, '❌ Error', 'err');
  }
  running = false;
  if(rbtn) rbtn.classList.remove('spinning');
  renderCellNum(id);
}

// Gestor de archivos (solo admin/founder)
let fileClipboard = null;
let currentPath = [];

function getFS() { return JSON.parse(localStorage.getItem('qcol_fs') || '{"name":"raíz","type":"folder","children":[]}'); }
function saveFS(fs) { localStorage.setItem('qcol_fs', JSON.stringify(fs)); }
function fsNavigate(root, path) {
    let node = root;
    for(const seg of path) {
        const found = node.children?.find(c => c.name === seg && c.type === 'folder');
        if(!found) return null;
        node = found;
    }
    return node;
}
function renderFileTree() {
    if(curView !== 'files') return;
    const fs = getFS();
    const node = fsNavigate(fs, currentPath);
    const el = document.getElementById('file-tree');
    const pathEl = document.getElementById('file-path-display');
    if(!el || !node) return;
    pathEl.textContent = '/ ' + (currentPath.join(' / ') || 'raíz');
    let html = '';
    if(currentPath.length > 0) html += `<div class="fi-row fi-up" onclick="fileCdUp()" style="cursor:pointer;padding:.3rem .5rem;color:var(--mu);">← .. (subir)</div>`;
    (node.children || []).forEach(item => {
        const isFolder = item.type === 'folder';
        const icon = isFolder ? '📁' : (item.name.endsWith('.ipynb') ? '📓' : '📄');
        html += `<div class="fi-row" style="display:flex;align-items:center;gap:.4rem;padding:.28rem .5rem;border-radius:5px;cursor:pointer;" ondblclick="${isFolder ? `fileCd('${item.name.replace(/'/g,"\\'")}')` : `fileOpen('${item.name.replace(/'/g,"\\'")}')`}" oncontextmenu="event.preventDefault();">
            <span>${icon}</span>
            <span style="flex:1;">${escapeHtml(item.name)}</span>
            <div style="display:flex;gap:.2rem;opacity:0;" class="fi-actions">
                ${isFolder ? '' : `<button class="tbtn" style="padding:.1rem .3rem;" onclick="event.stopPropagation();fileOpen('${item.name.replace(/'/g,"\\'")}')">📝</button>`}
                <button class="tbtn" style="padding:.1rem .3rem;" onclick="event.stopPropagation();fileCopy('${item.name.replace(/'/g,"\\'")}','${item.type}')">📋</button>
                <button class="tbtn" style="padding:.1rem .3rem;" onclick="event.stopPropagation();fileCut('${item.name.replace(/'/g,"\\'")}','${item.type}')">✂️</button>
                <button class="tbtn" style="padding:.1rem .3rem;" onclick="event.stopPropagation();fileRename('${item.name.replace(/'/g,"\\'")}','${item.type}')">✏️</button>
                <button class="tbtn" style="padding:.1rem .3rem;color:#ff8899;" onclick="event.stopPropagation();fileDelete('${item.name.replace(/'/g,"\\'")}','${item.type}')">🗑</button>
            </div>
        </div>`;
    });
    el.innerHTML = html;
    document.getElementById('btn-paste').style.display = fileClipboard ? '' : 'none';
    el.querySelectorAll('.fi-row').forEach(row => {
        row.addEventListener('mouseenter', () => { const a = row.querySelector('.fi-actions'); if(a) a.style.opacity='1'; });
        row.addEventListener('mouseleave', () => { const a = row.querySelector('.fi-actions'); if(a) a.style.opacity='0'; });
    });
}
function fileCd(name) { currentPath.push(name); renderFileTree(); }
function fileCdUp() { currentPath.pop(); renderFileTree(); }
function fileNewFolder() { const name = prompt('Nombre de carpeta:'); if(!name||!name.trim()) return; const fs=getFS(); const node=fsNavigate(fs,currentPath); if(node.children.find(c=>c.name===name.trim())){ notify('Ya existe'); return; } node.children.push({name:name.trim(),type:'folder',children:[]}); saveFS(fs); renderFileTree(); notify('📁 Creada'); }
function fileDelete(name,type) { if(!confirm(`¿Eliminar ${name}?`)) return; const fs=getFS(); const node=fsNavigate(fs,currentPath); node.children = node.children.filter(c=>c.name!==name); saveFS(fs); renderFileTree(); notify('🗑 Eliminado'); }
function fileRename(name,type) { const newName = prompt('Nuevo nombre:',name); if(!newName||newName===name) return; const fs=getFS(); const node=fsNavigate(fs,currentPath); const item=node.children.find(c=>c.name===name); if(item) item.name=newName.trim(); saveFS(fs); renderFileTree(); notify('✏️ Renombrado'); }
function fileCopy(name,type) { const fs=getFS(); const node=fsNavigate(fs,currentPath); const item=node.children.find(c=>c.name===name); if(!item) return; fileClipboard={action:'copy',item:JSON.parse(JSON.stringify(item)),fromPath:[...currentPath]}; notify('📋 Copiado'); renderFileTree(); }
function fileCut(name,type) { const fs=getFS(); const node=fsNavigate(fs,currentPath); const item=node.children.find(c=>c.name===name); if(!item) return; fileClipboard={action:'cut',item:JSON.parse(JSON.stringify(item)),fromPath:[...currentPath],name}; notify('✂️ Cortado'); renderFileTree(); }
function filePaste() { if(!fileClipboard) return; const fs=getFS(); const dest=fsNavigate(fs,currentPath); if(!dest) return; let pasteName=fileClipboard.item.name; while(dest.children.find(c=>c.name===pasteName)) pasteName='copia_'+pasteName; fileClipboard.item.name=pasteName; dest.children.push(fileClipboard.item); if(fileClipboard.action==='cut'){ const src=fsNavigate(fs,fileClipboard.fromPath); if(src) src.children=src.children.filter(c=>c.name!==fileClipboard.name); fileClipboard=null; } saveFS(fs); renderFileTree(); notify('📋 Pegado'); }
function fileOpen(name) { const fs=getFS(); const node=fsNavigate(fs,currentPath); const item=node.children.find(c=>c.name===name); if(!item||item.type!=='file'||!name.endsWith('.ipynb')) return; try{ const nb=JSON.parse(item.content); cells=nb.cells.map(c=>({id:genId(),type:c.cell_type==='markdown'?'markdown':'code',code:Array.isArray(c.source)?c.source.join(''):c.source||'',output:'',exec_count:null,mdEdit:false})); document.getElementById('nb-name-inp').value=name.replace('.ipynb',''); renderCells(); if(cells[0]) focusCell(cells[0].id); setView('notebook'); notify('📂 Abierto: '+name); }catch(e){ notify('❌ Error al abrir'); } }

// resto funciones auxiliares
function renderCells(){ const scroll=document.getElementById('nb-scroll'); const bottom=scroll.querySelector('.nb-bottom'); scroll.querySelectorAll('.nb-cell,.add-cell-row').forEach(el=>el.remove()); if(cells.length===0){ const emptyDiv=document.createElement('div'); emptyDiv.className='empty-placeholder'; emptyDiv.innerHTML='✨ <strong>Sin celdas</strong><br><button class="nb-add-big" style="margin-top:1rem;" onclick="addCellAt(-1,\'code\')">＋ Añadir primera celda</button>'; scroll.insertBefore(emptyDiv,bottom); }else{ cells.forEach((cell,i)=>{ const row=buildAddRow(i-1); scroll.insertBefore(row,bottom); const el=buildCellEl(cell,i); scroll.insertBefore(el,bottom); }); const row=buildAddRow(cells.length-1); scroll.insertBefore(row,bottom); } if(curCellId) focusCell(curCellId); updateStatus(); }
function buildAddRow(afterIdx){ const row=document.createElement('div'); row.className='add-cell-row'; row.innerHTML=`<div class="add-cell-line"></div><div class="add-cell-btns"><button class="add-btn" onclick="addCellAt(${afterIdx},'code')">＋ Código</button><button class="add-btn" onclick="addCellAt(${afterIdx},'markdown')">＋ Texto</button></div><div class="add-cell-line"></div>`; return row; }
function buildCellEl(cell,i){ const el=document.createElement('div'); el.className='nb-cell'+(curCellId===cell.id?' active':''); el.dataset.id=cell.id; el.onclick=()=>focusCell(cell.id); const isCode=cell.type==='code'; const execLbl=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]'; const toolbar=`<div class="cell-toolbar"><button class="ct-btn" onclick="event.stopPropagation();moveCellUp('${cell.id}')">↑</button><button class="ct-btn" onclick="event.stopPropagation();moveCellDown('${cell.id}')">↓</button><button class="ct-btn" onclick="event.stopPropagation();changeCellType('${cell.id}')">${isCode?'Md':'{ }'}</button><button class="ct-btn danger" onclick="event.stopPropagation();deleteCell('${cell.id}')">✕</button></div>`;
  if(isCode){ el.innerHTML=`${toolbar}<div class="cell-gutter"><div class="cell-num ${cell.hasError ? 'error' : ''}" id="num-${cell.id}">${execLbl}</div><button class="cell-run-btn" id="rbtn-${cell.id}" onclick="event.stopPropagation();runCell('${cell.id}')">▶</button></div><div class="cell-body"><div class="cell-type-badge ctb-code">{ } Python</div><div class="cell-code-area" id="area-${cell.id}"></div><div class="cell-output-area" id="output-area-${cell.id}"></div></div>`; setTimeout(()=>{ const areaDiv=document.getElementById(`area-${cell.id}`); if(areaDiv && !areaDiv.cm){ const cm=CodeMirror(areaDiv,{value:cell.code||'',mode:'python',theme:'dracula',lineNumbers:true,indentUnit:4,tabSize:4,autoCloseBrackets:true,matchBrackets:true,extraKeys:{'Shift-Enter':()=>runCell(cell.id),'Ctrl-Enter':()=>runCell(cell.id),'Tab':(cm)=>cm.execCommand('insertSoftTab'),'Ctrl-S':()=>saveCurrentNb(true)}}); cm.on('change',()=>{ cell.code=cm.getValue(); autoSaveDebounced(); pushUndo(); }); areaDiv.cm=cm; if(curCellId===cell.id) cm.focus(); } },20); } else { if(cell.mdEdit){ el.innerHTML=`${toolbar}<div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div><div class="cell-body"><div class="cell-type-badge ctb-md">✦ Markdown / LaTeX</div><div class="md-split"><div class="md-editor-pane"><textarea class="cell-md-split-area" id="mta-${cell.id}" placeholder="# Título&#10;Escribe Markdown o LaTeX: $E=mc^2$" oninput="syncCellCode('${cell.id}');renderMdPreview('${cell.id}');autoSaveDebounced();pushUndo();" rows="6">${escapeHtml(cell.code||'')}</textarea></div><div class="md-preview-pane" id="md-preview-${cell.id}"></div></div></div>`; setTimeout(()=>renderMdPreview(cell.id),20); } else { const renderedMd=renderMarkdownSimple(cell.code||''); el.innerHTML=`${toolbar}<div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div><div class="cell-body"><div class="cell-type-badge ctb-md">✦ Markdown</div><div class="cell-md-rendered" id="mren-${cell.id}" ondblclick="editMd('${cell.id}')">${renderedMd}</div></div>`; } } return el; }
function syncCellCode(id){ const cell=cells.find(c=>c.id===id); if(!cell) return; if(cell.type==='code'){ const areaDiv=document.getElementById(`area-${id}`); if(areaDiv && areaDiv.cm) cell.code=areaDiv.cm.getValue(); } else { const ta=document.getElementById(`mta-${id}`); if(ta) cell.code=ta.value; } }
function renderMarkdownSimple(text){ if(!text) return '<em>✏️ Doble clic para editar</em>'; try{ return marked.parse(text); }catch(e){ return `<pre>${escapeHtml(text)}</pre>`; } }
async function renderMdPreview(cellId){ const cell=cells.find(c=>c.id===cellId); if(!cell||cell.type!=='markdown') return; const preview=document.getElementById(`md-preview-${cellId}`); if(!preview) return; const html=marked.parse(cell.code||''); preview.innerHTML=html; if(window.MathJax) await MathJax.typesetPromise([preview]); if(window.hljs) preview.querySelectorAll('pre code').forEach(block=>hljs.highlightElement(block)); }
function editMd(id){ if(_expositionMode) return; const cell=cells.find(c=>c.id===id); if(cell){ cell.mdEdit=true; renderCells(); focusCell(id); } }
function addCellAt(afterIdx,type){ if(_expositionMode) { notify('Modo exposición — no se pueden añadir celdas'); return; } pushUndo(); const cell={id:genId(),type,code:type==='code'?'':'',output:'',exec_count:null,mdEdit:false,hasError:false}; if(afterIdx===-1||afterIdx>=cells.length) cells.push(cell); else cells.splice(afterIdx+1,0,cell); renderCells(); focusCell(cell.id); updateStatus(); }
function deleteCell(id){ if(_expositionMode) return; pushUndo(); cells=cells.filter(c=>c.id!==id); if(curCellId===id) curCellId=cells[0]?.id||null; renderCells(); updateStatus(); }
function moveCellUp(id){ if(_expositionMode) return; pushUndo(); const i=cells.findIndex(c=>c.id===id); if(i<=0) return; [cells[i-1],cells[i]]=[cells[i],cells[i-1]]; renderCells(); focusCell(id); }
function moveCellDown(id){ if(_expositionMode) return; pushUndo(); const i=cells.findIndex(c=>c.id===id); if(i<0||i>=cells.length-1) return; [cells[i],cells[i+1]]=[cells[i+1],cells[i]]; renderCells(); focusCell(id); }
function changeCellType(id){ if(_expositionMode) return; pushUndo(); const cell=cells.find(c=>c.id===id); if(!cell) return; cell.type=cell.type==='code'?'markdown':'code'; cell.mdEdit=true; renderCells(); focusCell(id); }
function focusCell(id){ curCellId=id; document.querySelectorAll('.nb-cell').forEach(el=>el.classList.toggle('active',el.dataset.id===id)); const area=document.getElementById(`area-${id}`); if(area && area.cm) area.cm.focus(); else{ const ta=document.getElementById(`mta-${id}`); if(ta) ta.focus(); } }
function renderCellNum(id){ const cell=cells.find(c=>c.id===id); if(!cell) return; const numSpan=document.querySelector(`[data-id="${id}"] .cell-num`); if(numSpan){ numSpan.textContent=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]'; if(cell.hasError) numSpan.classList.add('error'); else numSpan.classList.remove('error'); } }
async function runCurCell(){ if(curCellId) await runCell(curCellId); }
async function runAll(){ for(const cell of cells) if(cell.type==='code'&&cell.code.trim()){ await runCell(cell.id); await new Promise(r=>setTimeout(r,200)); } }
function setSbRun(running,msg='',state=''){ const dot=document.getElementById('sb-dot'), txt=document.getElementById('sb-txt'); if(dot) dot.className='sb-dot '+(running?'sb-run':state==='err'?'sb-err':'sb-idle'); if(txt&&msg) txt.textContent=msg; }

function autoSaveDebounced(){ if(autoSaveTimer) clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(()=>{ if(curUser && cells.length && !_expositionMode) saveCurrentNb(false); }, 2000); }
function saveCurrentNb(showNotify=true){ if(_expositionMode) return; if(!curUser) return; cells.forEach(c=>syncCellCode(c.id)); const name=document.getElementById('nb-name-inp').value||'Sin título'; const key='qcol_nbs_'+(curUser.username||'dev'); const nbs=JSON.parse(localStorage.getItem(key)||'[]'); const existing=nbs.findIndex(n=>n.name===name); const entry={name,cells:JSON.parse(JSON.stringify(cells)),saved:new Date().toISOString()}; if(existing>=0) nbs[existing]=entry; else nbs.unshift(entry); localStorage.setItem(key,JSON.stringify(nbs.slice(0,50))); window.parent.postMessage({ type: 'QCOL_SAVE_NOTEBOOK', username: curUser?.username, notebook: { ...entry, savedAt: new Date().toLocaleDateString() } }, '*'); lastSaveTime=Date.now(); const saveSpan=document.getElementById('sb-save-status'); if(saveSpan) saveSpan.textContent='💾 Guardado'; setTimeout(()=>{ if(saveSpan) saveSpan.textContent='✓'; },2000); if(showNotify) notify('💾 Guardado: '+name); }
function newNotebook(){ if(_expositionMode) return; if(cells.length>0 && !confirm('¿Guardar antes de crear nuevo?')) return; saveCurrentNb(true); pushUndo(); cells=[]; execCounter=0; curCellId=null; document.getElementById('nb-name-inp').value='Nuevo Notebook'; addCellAt(-1,'code'); notify('✅ Nuevo notebook'); }
function loadNb(name){ if(_expositionMode) return; if(cells.length>0 && !confirm('Guardar actual antes de cargar?')) return; saveCurrentNb(false); const nbs=getSavedNbs(); const nb=nbs.find(n=>n.name===name); if(!nb) return; cells=nb.cells.map(c=>({...c,mdEdit:false,hasError:false})); document.getElementById('nb-name-inp').value=nb.name; renderCells(); if(cells[0]) focusCell(cells[0].id); setView('notebook'); notify('📂 Cargado: '+nb.name); }
function deleteNb(name){ if(_expositionMode) return; if(!confirm('¿Eliminar "'+name+'"?')) return; const key='qcol_nbs_'+(curUser?.username||'dev'); const nbs=getSavedNbs().filter(n=>n.name!==name); localStorage.setItem(key,JSON.stringify(nbs)); refreshNbs(); notify('🗑 Eliminado'); }
function getSavedNbs(){ if(!curUser) return []; const key='qcol_nbs_'+(curUser.username||'dev'); return JSON.parse(localStorage.getItem(key)||'[]'); }
function refreshNbs(){ const grid=document.getElementById('nb-grid'); if(!grid) return; const nbs=getSavedNbs(); if(nbs.length===0){ grid.innerHTML='<div class="empty-placeholder">📓 Sin notebooks guardados</div>'; return; } grid.innerHTML=nbs.map(nb=>`<div class="nb-card"><div class="nb-card-hdr"><div class="nb-card-title">${escapeHtml(nb.name)}</div><div class="nb-card-badge">${nb.cells?.length||0} celdas</div></div><div class="nb-card-body"><div class="nb-card-meta">${new Date(nb.saved).toLocaleDateString()}</div><div class="nb-card-actions"><button class="btn-edit-nb" onclick="loadNb('${escapeHtml(nb.name)}')">📝 Editar</button><button class="btn-pub-nb" onclick="loadNb('${escapeHtml(nb.name)}');showPublish()">📤 Publicar</button><button class="btn-del-nb" onclick="deleteNb('${escapeHtml(nb.name)}')">🗑</button></div></div></div>`).join(''); }
function importNb(){ if(_expositionMode) return; document.getElementById('import-file').click(); }
function handleImport(e){ if(_expositionMode) return; const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>{ try{ const nb=JSON.parse(ev.target.result); cells=[]; execCounter=0; const name=nb.metadata?.name||file.name.replace('.ipynb',''); document.getElementById('nb-name-inp').value=name; (nb.cells||[]).forEach(c=>{ const src=Array.isArray(c.source)?c.source.join(''):c.source||''; const type=c.cell_type==='markdown'?'markdown':'code'; cells.push({id:genId(),type,code:src,output:'',exec_count:null,mdEdit:false,hasError:false}); }); if(cells.length===0) addCellAt(-1,'code'); else { renderCells(); if(cells[0]) focusCell(cells[0].id); } setView('notebook'); notify(`✅ Importado: ${name} (${cells.length} celdas)`); }catch(err){ notify('❌ Error .ipynb: '+err.message); } }; reader.readAsText(file); e.target.value=''; }
function downloadNb(){ if(_expositionMode){ notify('Modo exposición — descarga desactivada'); return; } const name=document.getElementById('nb-name-inp').value||'qcol_notebook'; cells.forEach(c=>syncCellCode(c.id)); const nb={nbformat:4,nbformat_minor:5,metadata:{name},cells:cells.map(c=>({cell_type:c.type==='markdown'?'markdown':'code',source:[c.code],metadata:{},outputs:[]}))}; const blob=new Blob([JSON.stringify(nb,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name.replace(/\.ipynb$/,'')+'.ipynb'; a.click(); notify('📥 Descargado'); }
function showPublish(){ if(_expositionMode) return; document.getElementById('pub-title').value=document.getElementById('nb-name-inp').value||''; document.getElementById('pub-modal').classList.add('open'); }
function closePublish(){ document.getElementById('pub-modal').classList.remove('open'); }
async function publishNb(){ if(_expositionMode) return; if(!requireAuth()) return; saveCurrentNb(false); const title=document.getElementById('pub-title').value.trim()||'notebook'; const desc=document.getElementById('pub-desc').value; const token=document.getElementById('github-token').value.trim(); const contentBase64=btoa(unescape(encodeURIComponent(JSON.stringify({cells,title},null,2)))); if(token){ try{ const userResp=await fetch('https://api.github.com/user',{headers:{Authorization:`token ${token}`}}); if(!userResp.ok) throw new Error('Token inválido'); const user=await userResp.json(); const repo=`${user.login}/qcol-notebooks`; const path=`notebooks/${title.replace(/[^a-z0-9]/gi,'_')}.ipynb`; await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{method:'PUT',headers:{Authorization:`token ${token}`, 'Content-Type':'application/json'},body:JSON.stringify({message:'Publicar notebook QCOL',content:contentBase64,branch:'main'})}); notify(`✅ Publicado en GitHub: ${repo}`); }catch(err){ notify(`❌ GitHub error: ${err.message}`); } } else { downloadNb(); notify('📦 Descarga local .ipynb'); } closePublish(); }
function setView(v){ curView=v; document.getElementById('view-notebook').style.display=v==='notebook'?'flex':'none'; document.getElementById('view-manage').style.display=v==='manage'?'flex':'none'; document.getElementById('view-files').style.display=v==='files'?'flex':'none'; document.getElementById('stab-1').classList.toggle('on',v==='notebook'); document.getElementById('stab-2').classList.toggle('on',v==='manage'); document.getElementById('stab-3').classList.toggle('on',v==='files'); if(v==='manage') refreshNbs(); if(v==='files') renderFileTree(); }
function genId(){ return 'c'+Date.now()+Math.random().toString(36).slice(2,8); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function requireAuth(){ const role=curUser?.role||'guest'; if(role!=='admin'&&role!=='founder'){ notify('❌ Requiere Admin/Founder'); postCore('QCOL_LOGIN'); return false; } return true; }

function showUI(user){
  const newRole = user?.role || 'guest';
  const alreadyShowing = _initialized && (curUser?.role==='admin'||curUser?.role==='founder');
  const sameUser = alreadyShowing && curUser?.username === user?.username;
  if(sameUser) return;
  _initialized = true;
  curUser = user;
  if(!user || (newRole!=='admin'&&newRole!=='founder')){
    document.getElementById('access-denied').classList.add('show');
    ['topbar','secbar','main-area','statusbar'].forEach(id=>document.getElementById(id).style.display='none');
    return;
  }
  document.getElementById('access-denied').classList.remove('show');
  ['topbar','secbar','main-area','statusbar'].forEach(id=>document.getElementById(id).style.display='flex');
  document.getElementById('user-pill').textContent=(curUser.name||'—').split(' ')[0];
  document.getElementById('admin-pill').style.display='';
  const storedURL=localStorage.getItem('qcol_colab_url');
  if(storedURL){ engineURL=storedURL; checkEngine(); }
  refreshNbs();
  if(cells.length===0) addCellAt(-1,'code');
}

window.addEventListener('message', e=>{
    const d=e.data||{};
    if(d.type==='QCOL_USER' || d.type==='QCOL_USER_UPDATE'){
        const role=d.user?.role||'guest';
        if(role==='admin'||role==='founder') showUI(d.user);
        else if(d.user === null || !d.user) { _initialized=false; showUI(null); }
    }
    if(d.type==='QCOL_CONFIG_UPDATED' && d.engineUrl){
        engineURL=d.engineUrl; localStorage.setItem('qcol_colab_url',engineURL); checkEngine();
    }
    if(d.type==='QCOL_LOAD_NB' && d.nb){
        if(!d.expositionMode && !requireAuth()) return;
        _expositionMode = !!d.expositionMode;
        const nb = d.nb;
        document.getElementById('nb-name-inp').value=nb.title||'Sin título';
        if(nb.cells?.length){
            cells=nb.cells.map(c=>({...c,id:genId(),mdEdit:false,hasError:false}));
            renderCells();
            if(cells[0]) focusCell(cells[0].id);
        } else addCellAt(-1,'code');
        setView('notebook');
        if(d.expositionMode){
            if(!_initialized){
                _initialized=true;
                curUser=curUser||{name:'Invitado',role:'guest'};
                document.getElementById('access-denied').classList.remove('show');
                ['topbar','secbar','main-area','statusbar'].forEach(id=>document.getElementById(id).style.display='flex');
            }
            activateExpositionMode();
        }
        notify('📂 Cargado' + (d.expositionMode ? ' (modo exposición)' : ''));
    }
});
postCore('QCOL_GET_USER');
setTimeout(()=>{ if(!_initialized){ try{ const stored=localStorage.getItem('qcol_cur_user'); if(stored) showUI(JSON.parse(stored)); }catch(e){} } },800);
setTimeout(()=>{ if(!_initialized){ document.getElementById('access-denied').classList.add('show'); document.getElementById('access-denied').querySelector('.denied-desc').textContent='No hay sesión activa.'; document.getElementById('topbar').style.display='flex'; _initialized=true; } },3000);

document.addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey) && e.key==='s'){ e.preventDefault(); saveCurrentNb(true); }
    if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='Enter'){ e.preventDefault(); runAll(); }
    if(e.key==='Escape' && document.activeElement.tagName==='TEXTAREA') document.activeElement.blur();
    if(e.key==='b' && !document.activeElement.matches('input,textarea') && curCellId && !_expositionMode){
        const idx=cells.findIndex(c=>c.id===curCellId);
        addCellAt(idx,'code');
    }
    if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
    else if((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.key==='z'&&e.shiftKey))){ e.preventDefault(); redo(); }
});
setInterval(()=>{ if(curUser&&cells.length&&!_expositionMode){ const mins=Math.floor((Date.now()-lastSaveTime)/60000); const span=document.getElementById('sb-save-status'); if(span) span.textContent=mins>0?`⏱️ ${mins}min`:'✓'; } },60000);
if(window.marked) marked.setOptions({highlight:function(code,lang){ if(lang&&hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value; return code; }});
</script>
