<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quantum App Studio · Connected to Founder</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e1a;
            --bg2: #0d1220;
            --bg3: #111827;
            --bg4: #060912;
            --bd: #1a2a48;
            --bd2: #1e3058;
            --bl: #0088ff;
            --bl2: #00aaff;
            --cy: #00ffdd;
            --gr: #00ff88;
            --yw: #ffd700;
            --rd: #ff4466;
            --pu: #bd93f9;
            --tx: #dce8ff;
            --tx2: #8aa0c4;
            --mu: #3d5a8a;
        }
        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .notif {
            position: fixed;
            top: 0.6rem;
            right: 0.6rem;
            z-index: 9999;
            padding: 0.45rem 0.85rem;
            background: rgba(6,9,18,0.97);
            border: 1px solid var(--cy);
            border-radius: 7px;
            font-family: monospace;
            font-size: 0.55rem;
            color: var(--cy);
            transform: translateX(130%);
            transition: transform 0.28s;
            backdrop-filter: blur(20px);
            pointer-events: none;
        }
        .notif.show { transform: translateX(0); }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        .repo-header {
            padding: 0.8rem 1rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--bd);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .repo-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--bl2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #003a9e, var(--bl));
            border: none;
            border-radius: 6px;
            padding: 0.3rem 0.7rem;
            font-weight: bold;
            font-size: 0.75rem;
            color: white;
            font-family: monospace;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-primary:hover {
            transform: scale(0.98);
        }
        .projects-grid {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .project-card {
            background: var(--bg3);
            border: 1px solid var(--bd);
            border-radius: 16px;
            padding: 1rem;
            transition: 0.1s;
        }
        .project-card:hover { border-color: var(--bl); background: rgba(0,136,255,0.05); }
        .project-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .card-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
        .btn-secondary {
            background: rgba(30,48,88,0.7);
            border: 1px solid var(--bd2);
            border-radius: 6px;
            padding: 0.3rem 0.7rem;
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--tx2);
            cursor: pointer;
        }
        .btn-secondary:hover { background: var(--bl); color: white; border-color: var(--bl); }
        .btn-pending {
            background: rgba(255,215,0,0.15);
            border: 1px solid var(--yw);
            color: var(--yw);
        }
        .btn-pending:hover { background: var(--yw); color: #0a0e1a; border-color: var(--yw); }
        .editor-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }
        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg4);
            border-right: 1px solid var(--bd);
        }
        .pane-header {
            padding: 0.5rem;
            background: #060912;
            border-bottom: 1px solid var(--bd);
            font-family: monospace;
            font-size: 0.7rem;
        }
        .code-area {
            flex: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            background: var(--bg4);
            color: var(--tx);
            border: none;
            padding: 0.8rem;
            resize: none;
            outline: none;
            white-space: pre-wrap;
        }
        .top-editor-bar {
            padding: 0.5rem;
            display: flex;
            gap: 0.8rem;
            background: var(--bg2);
            align-items: center;
            flex-wrap: wrap;
        }
        .editor-config {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-left: auto;
        }
        .server-input {
            background: var(--bg3);
            border: 1px solid var(--bd2);
            border-radius: 6px;
            padding: 0.3rem 0.6rem;
            font-family: monospace;
            font-size: 0.6rem;
            color: var(--tx);
            width: 220px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.open { visibility: visible; opacity: 1; }
        .modal-content {
            width: 90%;
            height: 85%;
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 0.5rem 1rem;
            background: #1e1e2f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-iframe { flex: 1; border: none; background: white; }
        .runner-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .runner-header {
            padding: 0.5rem 1rem;
            background: var(--bg2);
            border-bottom: 1px solid var(--bd);
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .app-iframe { flex: 1; width: 100%; border: none; background: white; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--mu);
            display: inline-block;
        }
        .status-dot.active { background: var(--gr); box-shadow: 0 0 5px var(--gr); }
        .auto-status {
            font-size: 0.5rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(0,255,136,0.1);
            color: var(--gr);
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
<div class="notif" id="notif"></div>

<!-- REPOSITORY -->
<div id="repo-screen" class="screen">
    <div class="repo-header">
        <div class="repo-title"></div>
        <button class="btn-primary" id="new-project-btn">+ New application</button>
    </div>
    <div class="projects-grid" id="projects-grid"></div>
</div>

<!-- EDITOR -->
<div id="editor-screen" class="screen hidden">
    <div class="top-editor-bar">
        <input type="text" id="project-name-input" placeholder="Project name" style="background:var(--bg3); border:1px solid var(--bd); border-radius:6px; padding:0.4rem; color:white; width:240px;">
        <div class="editor-config">
            <!-- server-url-input hidden: URL arrives automatically from Founder Panel -->
            <input type="text" id="server-url-input" style="display:none;" readonly>
            <span id="server-status" style="display:none;"></span>
            <span id="test-server-btn" style="display:none;"></span>
            <span id="auto-status" class="auto-status" style="display:none;"></span>
        </div>
        <button class="btn-primary" id="save-project-editor">💾 Save project</button>
        <button class="btn-secondary" id="preview-run-btn">▶ Test run</button>
        <button class="btn-secondary" id="back-to-repo-editor">← Back</button>
    </div>
    <div class="editor-container">
        <div class="editor-pane">
            <div class="pane-header">🐍 PYTHON LOGIC (remote backend)</div>
            <textarea id="python-editor" class="code-area" spellcheck="false"></textarea>
        </div>
        <div class="editor-pane">
            <div class="pane-header">🌐 HTML + JS INTERFACE (frontend)</div>
            <textarea id="html-editor" class="code-area" spellcheck="false"></textarea>
        </div>
    </div>
    <div style="padding:0.3rem 0.8rem; background:#060912; font-size:0.55rem; color:var(--mu);">
        💡 Python functions are called with <span style="color:var(--cy);">window.pyCall("function", args...)</span>. The server URL is obtained automatically from the Founder Panel.
    </div>
</div>

<!-- RUNNER -->
<div id="runner-screen" class="screen hidden">
    <div class="runner-header">
        <button class="btn-secondary" id="back-to-repo-runner">← Repository</button>
        <span id="runner-app-name" style="font-weight:bold;"></span>
        <span id="runner-mode" style="margin-left:auto; font-size:0.6rem;"><span class="status-dot" id="runner-dot"></span> Connecting...</span>
    </div>
    <iframe id="app-iframe" class="app-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
</div>

<!-- PREVIEW MODAL -->
<div id="preview-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <strong>🔬 Application test (unsaved)</strong>
            <button class="btn-secondary" id="close-modal-btn">Close</button>
        </div>
        <iframe id="preview-iframe" class="modal-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
</div>

<script>
    // ---------- REPOSITORY + EDITOR + REMOTE BACKEND ----------
    let projects = [];
    let currentEditId = null;
    let remoteSessionStatus = false;
    let isEmbedded = false;
    let parentOrigin = null;          // trusted origin when embedded
    let receivedUrl = false;

    // ═══════════════════════════════════════════════════════════
    // 🛡️ PROTECTION: Force English AI + Clean editor on project switch
    // ═══════════════════════════════════════════════════════════
    (function initProtections() {
        // 1. Force AI language to English
        const storedAI = JSON.parse(localStorage.getItem('qcol_ai') || '{}');
        if (!storedAI.lang || storedAI.lang === 'es') {
            storedAI.lang = 'en';
            localStorage.setItem('qcol_ai', JSON.stringify(storedAI));
        }

        // 2. Validate saved projects integrity on load
        const stored = localStorage.getItem('quantum_apps_repo_v2');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                // Remove any project that has contaminated content (matching another project's code)
                const cleanProjects = parsed.filter((proj, idx, arr) => {
                    return !arr.some((other, otherIdx) => 
                        otherIdx !== idx && 
                        other.pythonCode === proj.pythonCode && 
                        other.htmlCode === proj.htmlCode &&
                        other.pythonCode.length > 10 // only flag if there's actual content
                    );
                });
                if (cleanProjects.length !== parsed.length) {
                    localStorage.setItem('quantum_apps_repo_v2', JSON.stringify(cleanProjects));
                    localStorage.setItem('quantum_apps_repo_v2_backup', stored); // keep backup
                }
            } catch(e) {}
        }
    })();
    // ═══════════════════════════════════════════════════════════

    function notify(msg, dur=2000) {
        const n = document.getElementById('notif');
        n.textContent = msg;
        n.classList.add('show');
        clearTimeout(n._t);
        n._t = setTimeout(() => n.classList.remove('show'), dur);
        if (isEmbedded && parentOrigin) sendToParent({ type: 'QCOL_STUDIO_NOTIFICATION', message: msg });
    }

    function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 10); }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function sendToParent(msg) { 
        if (window.parent && window.parent !== window && parentOrigin) {
            try { window.parent.postMessage(msg, parentOrigin); } catch(e) {}
        }
    }

    function decodeUnicode(str) {
        if (!str || typeof str !== 'string') return str;
        return str.replace(/\\u([0-9a-fA-F]{4})/g, (match, hex) => String.fromCharCode(parseInt(hex, 16)));
    }

    function setServerUrl(url) {
        if (!url) return;
        const input = document.getElementById('server-url-input');
        if (input && input.value !== url) {
            input.value = url;
            input.style.background = '#0a4a2a';
            setTimeout(() => { if(input) input.style.background = '#0a0e1a'; }, 500);
            updateServerStatusText(url);
            notify('✅ Server URL automatically configured', 1500);
            receivedUrl = true;
        }
    }

    // ================== OVER-READING PROTECTION ==================
    // Validate the origin of each message before processing it
    window.addEventListener('message', async (event) => {
        const data = event.data;
        if (!data || typeof data !== 'object') return;

        // --- Origin validation (protect against over-reading) ---
        if (isEmbedded) {
            // If we don't have a trusted origin yet, only accept the connection message
            if (!parentOrigin) {
                if (data.type === 'QCOL_REQUEST_STUDIO_CONNECTION') {
                    parentOrigin = event.origin;
                    // Continue with normal message handling
                } else {
                    return; // any other message before connection is ignored
                }
            } else if (event.origin !== parentOrigin) {
                // Unauthorized origin
                return;
            }
        } else {
            // Standalone mode: only accept messages from the same origin (or null for file://)
            const selfOrigin = window.location.origin;
            if (selfOrigin !== 'null' && event.origin !== selfOrigin) return;
            if (selfOrigin === 'null' && event.origin !== 'null') return;
        }

        // --- From here the message comes from a trusted origin ---
        
        if (data.type === 'QCOL_COMPILER_URL' && data.url) {
            setServerUrl(data.url);
            return;
        }
        if (data.type === 'QCOL_CONFIG_UPDATE' && data.compilerUrl) {
            setServerUrl(data.compilerUrl);
            return;
        }
        
        if (data.type === 'QCOL_REQUEST_STUDIO_CONNECTION') {
            isEmbedded = true;
            if (!parentOrigin) parentOrigin = event.origin;
            sendToParent({ type: 'QCOL_STUDIO_OPENED', version: '2.0', status: 'ready' });
            notify('Connected to Founder Panel (origin validated)', 1500);
            sendToParent({ type: 'QCOL_REQUEST_COMPILER_URL' });
            return;
        }
        
        if (data.type === 'QCOL_OPEN_APP_FROM_PUZZLE') {
            const { appId, appName, pythonCode, htmlCode, serverUrl } = data;
            if (appId && appName) {
                // ── PROTECTION: save current state before loading the puzzle app
                if (currentEditId && currentEditId !== appId) {
                    const prevIdx = projects.findIndex(p => p.id === currentEditId);
                    if (prevIdx !== -1) {
                        projects[prevIdx].pythonCode = document.getElementById('python-editor').value;
                        projects[prevIdx].htmlCode   = document.getElementById('html-editor').value;
                        projects[prevIdx].name       = document.getElementById('project-name-input').value.trim() || projects[prevIdx].name;
                        saveProjects();
                    }
                }
                let existing = projects.find(p => p.id === appId);
                if (existing) {
                    currentEditId = appId;
                    document.getElementById('project-name-input').value = existing.name;
                    document.getElementById('python-editor').value      = '';
                    document.getElementById('html-editor').value        = '';
                    document.getElementById('python-editor').value      = existing.pythonCode || '';
                    document.getElementById('html-editor').value        = existing.htmlCode   || '';
                    if (existing.serverUrl) setServerUrl(existing.serverUrl);
                } else {
                    const newProj = {
                        id: appId,
                        name: appName,
                        pythonCode: pythonCode || '# Python Code\n',
                        htmlCode: htmlCode || '<!DOCTYPE html>\n<html>\n<body>\n<h1>App from Puzzle</h1>\n</body>\n</html>',
                        serverUrl: serverUrl || '',
                        createdAt: Date.now()
                    };
                    projects.push(newProj);
                    currentEditId = appId;
                    document.getElementById('project-name-input').value = newProj.name;
                    document.getElementById('python-editor').value      = '';
                    document.getElementById('html-editor').value        = '';
                    document.getElementById('python-editor').value      = newProj.pythonCode;
                    document.getElementById('html-editor').value        = newProj.htmlCode;
                    if (newProj.serverUrl) setServerUrl(newProj.serverUrl);
                    saveProjects();
                }
                showScreen('editor');
                sendToParent({ type: 'QCOL_STUDIO_APP_LOADED', appId: currentEditId });
            }
            return;
        }
        
        if (data.type === 'QCOL_GET_APPS') {
            const apps = projects.map(p => ({ id: p.id, name: p.name, serverUrl: p.serverUrl, createdAt: p.createdAt }));
            sendToParent({ type: 'QCOL_APPS_LIST', apps });
            return;
        }

        if (data.type === 'QCOL_REQUEST_COMPILE') {
            const { requestId, appId, appName, pythonCode, htmlCode, serverUrl } = data;
            try {
                const finalServerUrl = serverUrl || localStorage.getItem('qcol_colab_url') || '';
                
                const bridge = `
                <script>
                window.__serverUrl = ${JSON.stringify(finalServerUrl)};
                window.__pyCode = ${JSON.stringify(pythonCode || '# Empty Python')};
                window.pyCall = async (funcName, ...args) => {
                    return new Promise((resolve, reject) => {
                        const msgId = Date.now() + '-' + Math.random();
                        const handler = (event) => {
                            if (event.data.type === 'pyResult' && event.data.id === msgId) {
                                window.removeEventListener('message', handler);
                                if (event.data.error) reject(new Error(event.data.error));
                                else resolve(event.data.result);
                            }
                        };
                        window.addEventListener('message', handler);
                        window.parent.postMessage({ type: 'pyCall', id: msgId, func: funcName, args: args, serverUrl: window.__serverUrl, pythonCode: window.__pyCode }, '*');
                    });
                };
                console.log("Bridge ready, server:", window.__serverUrl);
                <\/script>
                `;
                
                let finalHtml = htmlCode || '<!DOCTYPE html><html><body><h1>App without interface</h1></body></html>';
                if (finalHtml.includes('<head>')) {
                    finalHtml = finalHtml.replace('<head>', '<head>' + bridge);
                } else if (finalHtml.includes('<html>')) {
                    finalHtml = finalHtml.replace('<html>', '<html><head>' + bridge + '</head>');
                } else {
                    finalHtml = bridge + finalHtml;
                }
                
                if (event.source) {
                    event.source.postMessage({
                        type: 'QCOL_COMPILE_RESPONSE',
                        requestId: requestId,
                        html: finalHtml,
                        error: null
                    }, parentOrigin || '*');
                }
            } catch (err) {
                if (event.source) {
                    event.source.postMessage({
                        type: 'QCOL_COMPILE_RESPONSE',
                        requestId: requestId,
                        html: null,
                        error: err.message
                    }, parentOrigin || '*');
                }
            }
            return;
        }
    });

    function notifyParentAboutChange(action, appId, appData = null) {
        if (!isEmbedded || !parentOrigin) return;
        sendToParent({ type: action === 'save' ? 'QCOL_APP_SAVED' : 'QCOL_APP_DELETED', appId, appData });
    }

    function saveProjects() {
        // 🛡️ Overwrite protection: save a backup of the previous version
        const previousBackup = localStorage.getItem('quantum_apps_repo_v2');
        if (previousBackup) {
            localStorage.setItem('quantum_apps_repo_v2_backup', previousBackup);
        }

        localStorage.setItem('quantum_apps_repo_v2', JSON.stringify(projects));
        if (isEmbedded && currentEditId && parentOrigin) {
            const proj = projects.find(p => p.id === currentEditId);
            if (proj) notifyParentAboutChange('save', currentEditId, { name: proj.name, serverUrl: proj.serverUrl });
        }
    }

    function loadProjects() {
        const stored = localStorage.getItem('quantum_apps_repo_v2');
        if (stored) try { projects = JSON.parse(stored); } catch(e) { projects = []; }
        if (!projects.length) {
            projects.push({
                id: generateId(),
                name: "Demo: Quantum greeting",
                pythonCode: `def greet(name):\n    return f"Hello {name}! from Python on quantum server 🧪"\n\ndef add(a,b):\n    return a+b`,
                htmlCode: `<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"></head>\n<body style="background:#0a0e1a; color:white; font-family:monospace; padding:1rem;">\n<h2>Interactive Demo</h2>\n<input id="nameInput" placeholder="Your name" style="padding:0.3rem;">\n<button onclick="callGreet()">Greet</button>\n<p id="result"></p>\n<script>\nwindow.callGreet = async () => {\n    const name = document.getElementById('nameInput').value;\n    const res = await window.pyCall("greet", name);\n    document.getElementById('result').innerText = res;\n};\n<\/script>\n</body>\n</html>`,
                serverUrl: "",
                createdAt: Date.now()
            });
            saveProjects();
        }
    }

    function renderRepository() {
        const grid = document.getElementById('projects-grid');
        if (!grid) return;
        grid.innerHTML = '';
        projects.forEach(proj => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `
                <div class="project-name">📦 ${escapeHtml(proj.name)}</div>
                <div class="card-actions">
                    <button class="btn-secondary edit-proj" data-id="${proj.id}">✏️ Edit</button>
                    <button class="btn-secondary run-proj" data-id="${proj.id}">▶ Run</button>
                    <button class="btn-secondary btn-pending launch-proj" data-id="${proj.id}">📤 Launch</button>
                    <button class="btn-secondary delete-proj" data-id="${proj.id}">🗑 Delete</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.edit-proj').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); editProject(btn.getAttribute('data-id')); }));
        document.querySelectorAll('.run-proj').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); launchProject(btn.getAttribute('data-id')); }));
        document.querySelectorAll('.launch-proj').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); sendToPending(btn.getAttribute('data-id')); }));
        document.querySelectorAll('.delete-proj').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); deleteProject(btn.getAttribute('data-id')); }));
    }

    function sendToPending(id) {
        const proj = projects.find(p => p.id === id);
        if (!proj) {
            notify("❌ Project not found");
            return;
        }
        
        const message = {
            type: 'QCOL_LAUNCH_QUANTUM_APP',
            appId: proj.id,
            appTitle: proj.name,
            appMetadata: {
                name: proj.name,
                pythonCode: proj.pythonCode,
                htmlCode: proj.htmlCode,
                serverUrl: proj.serverUrl || localStorage.getItem('qcol_colab_url') || '',
                createdAt: proj.createdAt
            }
        };
        
        if (window.parent !== window && parentOrigin) {
            sendToParent(message);
            notify(`🚀 App "${proj.name}" sent to Founder's pending list`, 2500);
        } else {
            let pendingApps = JSON.parse(localStorage.getItem('qcol_pending_apps') || '[]');
            // 🛡️ Duplicate protection: if an entry with the same id already exists, update it
            const existingIndex = pendingApps.findIndex(entry => entry.id === proj.id);
            const newEntry = {
                id: proj.id,
                name: proj.name,
                pythonCode: proj.pythonCode,
                htmlCode: proj.htmlCode,
                serverUrl: proj.serverUrl,
                timestamp: Date.now()
            };
            if (existingIndex !== -1) {
                pendingApps[existingIndex] = newEntry;
            } else {
                pendingApps.push(newEntry);
            }
            localStorage.setItem('qcol_pending_apps', JSON.stringify(pendingApps));
            notify(`📦 App "${proj.name}" saved in local pending. Connect to Founder Panel to sync.`, 3000);
        }
    }

    function editProject(id) {
        const proj = projects.find(p => p.id === id);
        if (!proj) return;

        // ── Anti-contamination: auto-save previous ONLY if it exists in the array
        // and its editor content does not match another project (prevents propagation)
        if (currentEditId && currentEditId !== id) {
            const prevIdx = projects.findIndex(p => p.id === currentEditId);
            if (prevIdx !== -1) {
                const pyVal   = document.getElementById('python-editor').value;
                const htmlVal = document.getElementById('html-editor').value;
                const nameVal = document.getElementById('project-name-input').value.trim();
                const isContaminated = projects.some((p, i) =>
                    i !== prevIdx && p.pythonCode === pyVal && p.htmlCode === htmlVal);
                if (!isContaminated) {
                    projects[prevIdx].pythonCode = pyVal;
                    projects[prevIdx].htmlCode   = htmlVal;
                    projects[prevIdx].name       = nameVal || projects[prevIdx].name;
                    saveProjects();
                }
            }
        }

        // ── 🛡️ CRITICAL: Clear editor BEFORE loading new project content
        // This prevents the old project's code from appearing briefly
        document.getElementById('project-name-input').value = '';
        document.getElementById('python-editor').value      = '';
        document.getElementById('html-editor').value        = '';

        // ── Load snapshot from array (source of truth), never from DOM
        currentEditId = id;
        document.getElementById('project-name-input').value = proj.name;
        document.getElementById('python-editor').value      = proj.pythonCode || '';
        document.getElementById('html-editor').value        = proj.htmlCode   || '';
        showScreen('editor');
    }

    async function updateServerStatusText(url) {
        const statusSpan = document.getElementById('server-status');
        if (!url) { statusSpan.innerHTML = '⚠️ No URL'; remoteSessionStatus = false; return; }
        statusSpan.innerHTML = '⏳ testing...';
        const ok = await testBackendConnection(url);
        if (ok) { statusSpan.innerHTML = '✅ server active'; remoteSessionStatus = true; }
        else { statusSpan.innerHTML = '❌ no response'; remoteSessionStatus = false; }
    }

    async function testBackendConnection(baseUrl) {
        try {
            const cleanUrl = baseUrl.replace(/\/+$/, '');
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 5000);
            const res = await fetch(cleanUrl + '/health/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [''] }),
                signal: controller.signal
            });
            clearTimeout(timeout);
            return res.ok;
        } catch(e) { return false; }
    }

    async function executePythonRemote(code, serverUrl) {
        if (!serverUrl) throw new Error("No server URL");
        const base = serverUrl.replace(/\/+$/, '');
        const isHF = base.includes('hf.space') || base.includes('huggingface');
        let url, body;
        if (isHF) {
            url = base + '/run/predict';
            body = JSON.stringify({ data: [code], fn_index: 0 });
        } else {
            url = base + '/run';
            body = JSON.stringify({ code: code, lib: 'python' });
        }
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        const data = isHF ? (raw.data?.[0] || raw) : raw;
        if (data.success === false) throw new Error(data.output || data.error);
        let output = data.output || data.result || "";
        output = decodeUnicode(output);
        return output;
    }

    // Handler for calls from iframes (pyCall) - same origin, no token needed
    window.addEventListener('message', async (event) => {
        // Only process pyCall if the origin is the same (blob:iframe origin is the same)
        if (event.data.type === 'pyCall') {
            // Verify origin to prevent abuse
            if (isEmbedded && parentOrigin && event.origin !== parentOrigin) return;
            if (!isEmbedded && event.origin !== window.location.origin && window.location.origin !== 'null') return;
            
            const { id, func, args, serverUrl, pythonCode } = event.data;
            try {
                if (!serverUrl) throw new Error("Missing server URL");
                const fullCode = `${pythonCode}\nimport json\n_result = ${func}(*${JSON.stringify(args)})\nprint(json.dumps(_result, ensure_ascii=False))`;
                const output = await executePythonRemote(fullCode, serverUrl);
                let result = output.trim();
                if ((result.startsWith('"') && result.endsWith('"')) || 
                    (result.startsWith('{') && result.endsWith('}')) ||
                    (result.startsWith('[') && result.endsWith(']'))) {
                    try { result = JSON.parse(result); } catch(e) {}
                }
                event.source.postMessage({ type: 'pyResult', id: id, result: result }, event.origin);
            } catch(err) {
                event.source.postMessage({ type: 'pyResult', id: id, error: err.message }, event.origin);
            }
        }
    });

    async function buildAppBlob(pythonCode, htmlCode, serverUrl) {
        const bridge = `
        <script>
        window.__serverUrl = ${JSON.stringify(serverUrl)};
        window.__pyCode = ${JSON.stringify(pythonCode)};
        window.pyCall = async (funcName, ...args) => {
            return new Promise((resolve, reject) => {
                const msgId = Date.now() + '-' + Math.random();
                const handler = (event) => {
                    if (event.data.type === 'pyResult' && event.data.id === msgId) {
                        window.removeEventListener('message', handler);
                        if (event.data.error) reject(new Error(event.data.error));
                        else resolve(event.data.result);
                    }
                };
                window.addEventListener('message', handler);
                window.parent.postMessage({ type: 'pyCall', id: msgId, func: funcName, args: args, serverUrl: window.__serverUrl, pythonCode: window.__pyCode }, '*');
            });
        };
        console.log("Bridge ready, server:", window.__serverUrl);
        <\/script>
        `;
        let finalHtml = htmlCode;
        if (finalHtml.includes('<head>')) finalHtml = finalHtml.replace('<head>', '<head>' + bridge);
        else if (finalHtml.includes('<html>')) finalHtml = finalHtml.replace('<html>', '<html><head>' + bridge + '</head>');
        else finalHtml = bridge + finalHtml;
        const blob = new Blob([finalHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        return { blobUrl: url, revoke: () => URL.revokeObjectURL(url) };
    }

    async function launchProject(id) {
        // ── 🛡️ PROTECTION: ALWAYS load from projects array, never from editor
        // The editor may contain content from another project if not saved
        const proj = projects.find(p => p.id === id);
        if (!proj) return;
        showScreen('runner');
        document.getElementById('runner-app-name').innerText = `⚛️ ${escapeHtml(proj.name)}`;
        const modeSpan = document.getElementById('runner-mode');
        const dot = document.getElementById('runner-dot');
        
        let serverToUse = proj.serverUrl || localStorage.getItem('qcol_colab_url') || '';
        
        const serverActive = serverToUse && await testBackendConnection(serverToUse);
        if (serverActive) {
            modeSpan.innerHTML = '<span class="status-dot active"></span> Remote (server active)';
            dot.className = 'status-dot active';
        } else {
            modeSpan.innerHTML = '<span class="status-dot"></span> ⚠️ No server';
            dot.className = 'status-dot';
        }
        const { blobUrl, revoke } = await buildAppBlob(proj.pythonCode, proj.htmlCode, serverToUse);
        const iframe = document.getElementById('app-iframe');
        iframe.src = blobUrl;
        iframe.onload = () => revoke();
    }

    async function runPreview() {
        const serverUrl = localStorage.getItem('qcol_colab_url') || '';
        const { blobUrl, revoke } = await buildAppBlob(
            document.getElementById('python-editor').value,
            document.getElementById('html-editor').value,
            serverUrl
        );
        const iframe = document.getElementById('preview-iframe');
        iframe.src = blobUrl;
        iframe.onload = () => revoke();
        document.getElementById('preview-modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('preview-modal').classList.remove('open');
        document.getElementById('preview-iframe').src = 'about:blank';
    }

    function showScreen(screenId) {
        document.getElementById('repo-screen').classList.add('hidden');
        document.getElementById('editor-screen').classList.add('hidden');
        document.getElementById('runner-screen').classList.add('hidden');
        if (screenId === 'repo') {
            document.getElementById('repo-screen').classList.remove('hidden');
            // ── When returning to repository, clear the editor
            // Prevents seeing residues from the previous project when opening another
            currentEditId = null;
            document.getElementById('project-name-input').value = '';
            document.getElementById('python-editor').value      = '';
            document.getElementById('html-editor').value        = '';
        } else if (screenId === 'editor') {
            document.getElementById('editor-screen').classList.remove('hidden');
        } else if (screenId === 'runner') {
            document.getElementById('runner-screen').classList.remove('hidden');
        }
    }

    function saveCurrentEdit() {
        const nameVal  = document.getElementById('project-name-input').value.trim();
        const pyVal    = document.getElementById('python-editor').value;
        const htmlVal  = document.getElementById('html-editor').value;
        // serverUrl comes from Founder automatically, not from input (hidden)
        const urlVal   = localStorage.getItem('qcol_colab_url') || '';

        // 🛡️ PROTECTION: Check if editor content matches another project (contamination)
        if (currentEditId) {
            const contaminated = projects.some(p => 
                p.id !== currentEditId && 
                p.pythonCode === pyVal && 
                p.htmlCode === htmlVal &&
                pyVal.length > 10
            );
            if (contaminated) {
                notify("⚠️ Editor contains code from another project. Switch projects to fix.");
                return;
            }
        }

        if (!currentEditId) {
            // Create new project
            if (!nameVal) { notify("Enter a name"); return; }
            const newId  = generateId();
            const newProj = {
                id:         newId,
                name:       nameVal,
                pythonCode: pyVal,
                htmlCode:   htmlVal,
                serverUrl:  urlVal,
                createdAt:  Date.now()
            };
            projects.push(newProj);
            currentEditId = newId;
            saveProjects();
            notify(`Project "${nameVal}" created`);
            showScreen('repo');
            renderRepository();
            return;
        }

        // Update existing project — verify that the id still exists
        const idx = projects.findIndex(p => p.id === currentEditId);
        if (idx === -1) {
            notify("❌ Error: project not found. Create a new one.");
            currentEditId = null;
            return;
        }
        // ── PROTECTION: only update the project whose id matches exactly
        // Never touch other projects
        projects[idx].name       = nameVal || projects[idx].name;
        projects[idx].pythonCode = pyVal;
        projects[idx].htmlCode   = htmlVal;
        projects[idx].serverUrl  = urlVal;
        saveProjects();
        notify("Project saved");
        showScreen('repo');
        renderRepository();
    }

    function deleteProject(id) {
        if (projects.length === 1) { notify("There must be at least one project"); return; }
        if (confirm("Delete application?")) {
            const deleted = projects.find(p => p.id === id);
            projects = projects.filter(p => p.id !== id);
            if (currentEditId === id) currentEditId = null;
            saveProjects();
            renderRepository();
            notify("Project deleted");
            if (isEmbedded && deleted && parentOrigin) sendToParent({ type: 'QCOL_APP_DELETED', appId: id });
        }
    }

    function startNewProject() {
        // ── Only auto-save if the project exists and the editor has no contaminated content
        if (currentEditId) {
            const prevIdx = projects.findIndex(p => p.id === currentEditId);
            if (prevIdx !== -1) {
                const pyVal   = document.getElementById('python-editor').value;
                const htmlVal = document.getElementById('html-editor').value;
                const nameVal = document.getElementById('project-name-input').value.trim();
                const isContaminated = projects.some((p, i) =>
                    i !== prevIdx && p.pythonCode === pyVal && p.htmlCode === htmlVal);
                if (!isContaminated) {
                    projects[prevIdx].pythonCode = pyVal;
                    projects[prevIdx].htmlCode   = htmlVal;
                    projects[prevIdx].name       = nameVal || projects[prevIdx].name;
                    saveProjects();
                }
            }
        }
        currentEditId = null;
        document.getElementById('project-name-input').value = 'New quantum app';
        document.getElementById('python-editor').value = '# Remote Python code\ndef my_function(param):\n    return f"Result: {param}"';
        document.getElementById('html-editor').value = '<!DOCTYPE html>\n<html>\n<head><meta charset="UTF-8"></head>\n<body style="background:#0a0e1a;color:white;font-family:sans-serif;padding:1.5rem;">\n<h2>⚛️ My Quantum App</h2>\n<button onclick="call()">Execute</button>\n<p id="out"></p>\n<script>\nasync function call(){\n  const r = await window.pyCall("my_function","hello");\n  document.getElementById("out").innerText = r;\n}\n<\/script>\n</body>\n</html>';
        showScreen('editor');
    }

    function bindEvents() {
        document.getElementById('new-project-btn').onclick = startNewProject;
        document.getElementById('save-project-editor').onclick = saveCurrentEdit;
        document.getElementById('back-to-repo-editor').onclick = () => showScreen('repo');
        document.getElementById('back-to-repo-runner').onclick = () => showScreen('repo');
        document.getElementById('preview-run-btn').onclick = runPreview;
        document.getElementById('close-modal-btn').onclick = closeModal;
        // test-server-btn hidden — URL arrives automatically from Founder Panel
    }

    // Initialization
    loadProjects();
    renderRepository();
    bindEvents();
    
    if (window.parent !== window) {
        setTimeout(() => {
            sendToParent({ type: 'QCOL_STUDIO_OPENED', version: '2.0', status: 'ready' });
            notify('Connected to Founder Panel (origin validated)', 1500);
            sendToParent({ type: 'QCOL_REQUEST_COMPILER_URL' });
            const savedUrl = localStorage.getItem('qcol_colab_url');
            if (savedUrl && !receivedUrl) setServerUrl(savedUrl);
        }, 500);
    } else {
        const savedUrl = localStorage.getItem('qcol_colab_url');
        if (savedUrl) setServerUrl(savedUrl);
    }
    
    setInterval(() => {
        if (window.parent !== window && !receivedUrl && parentOrigin) sendToParent({ type: 'QCOL_REQUEST_COMPILER_URL' });
    }, 3000);
    
    notify("Quantum App Studio · Protected against over-reading · Origins validated", 4000);
</script>
